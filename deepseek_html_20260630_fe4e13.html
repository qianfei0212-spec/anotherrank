<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>趣社区 - 自由分享交流</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        /* ===== CSS 变量 & 重置 ===== */
        :root {
            --primary: #4F7CFF;
            --primary-dark: #3a5fd9;
            --primary-light: #e8eeff;
            --secondary: #6C5CE7;
            --bg: #F0F2F5;
            --card-bg: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #6b7280;
            --border: #e5e7eb;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            --radius: 16px;
            --radius-sm: 10px;
            --nav-height: 64px;
            --max-width: 1200px;
            --transition: 0.25s ease;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding-top: var(--nav-height);
            line-height: 1.6;
        }
        a {
            text-decoration: none;
            color: inherit;
        }
        button {
            cursor: pointer;
            border: none;
            outline: none;
            font-family: inherit;
            font-size: inherit;
            background: none;
        }
        input,
        textarea {
            font-family: inherit;
            font-size: inherit;
            outline: none;
            border: none;
        }
        img {
            display: block;
        }
        .hidden {
            display: none !important;
        }

        /* ===== 导航栏 ===== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--nav-height);
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 1000;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
        }
        .navbar .logo {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .navbar .logo i {
            -webkit-text-fill-color: var(--primary);
            font-size: 26px;
        }
        .navbar .nav-links {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .navbar .nav-links a,
        .navbar .nav-links button {
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-secondary);
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .navbar .nav-links a:hover,
        .navbar .nav-links button:hover {
            background: var(--primary-light);
            color: var(--primary);
        }
        .navbar .nav-links a.active {
            background: var(--primary);
            color: #fff;
        }
        .navbar .nav-links a.active:hover {
            background: var(--primary-dark);
        }
        .navbar .user-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .navbar .user-area .avatar-sm {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--primary-light);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 15px;
            flex-shrink: 0;
        }
        .navbar .user-area .username {
            font-weight: 500;
            font-size: 14px;
            color: var(--text);
        }
        .navbar .user-area .btn-login {
            background: var(--primary);
            color: #fff;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 500;
            transition: var(--transition);
        }
        .navbar .user-area .btn-login:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }
        .navbar .user-area .btn-logout {
            color: var(--text-secondary);
            padding: 6px 12px;
            border-radius: 30px;
            font-weight: 400;
            transition: var(--transition);
        }
        .navbar .user-area .btn-logout:hover {
            background: #fee2e2;
            color: #dc2626;
        }

        /* ===== 移动端菜单 ===== */
        .nav-toggle {
            display: none;
            font-size: 24px;
            color: var(--text);
            background: none;
            border: none;
            padding: 4px 8px;
        }
        @media (max-width: 820px) {
            .nav-toggle {
                display: block;
            }
            .navbar .nav-links {
                position: absolute;
                top: var(--nav-height);
                left: 0;
                right: 0;
                background: var(--card-bg);
                flex-direction: column;
                padding: 16px 24px;
                gap: 4px;
                border-bottom: 1px solid var(--border);
                box-shadow: var(--shadow);
                display: none;
            }
            .navbar .nav-links.open {
                display: flex;
            }
            .navbar .nav-links a,
            .navbar .nav-links button {
                width: 100%;
                padding: 12px 16px;
                justify-content: center;
            }
            .navbar .user-area .username {
                display: none;
            }
        }

        /* ===== 主容器 ===== */
        .container {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 24px 20px;
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 28px;
        }
        @media (max-width: 960px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        /* ===== 帖子列表 ===== */
        .feed-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .feed-header h2 {
            font-size: 22px;
            font-weight: 700;
        }
        .feed-header .tabs {
            display: flex;
            gap: 4px;
            background: var(--bg);
            padding: 4px;
            border-radius: 30px;
        }
        .feed-header .tabs button {
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            transition: var(--transition);
        }
        .feed-header .tabs button.active {
            background: var(--card-bg);
            color: var(--text);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
        }
        .feed-header .tabs button:hover:not(.active) {
            color: var(--text);
        }

        /* ===== 帖子卡片 ===== */
        .post-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 20px 24px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
            transition: var(--transition);
            border: 1px solid transparent;
            cursor: pointer;
        }
        .post-card:hover {
            border-color: var(--border);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
        }
        .post-card .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }
        .post-card .post-header .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary-light);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 16px;
            flex-shrink: 0;
        }
        .post-card .post-header .info .name {
            font-weight: 600;
            font-size: 15px;
        }
        .post-card .post-header .info .time {
            font-size: 13px;
            color: var(--text-secondary);
        }
        .post-card .post-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 6px;
            line-height: 1.4;
        }
        .post-card .post-content {
            color: var(--text-secondary);
            font-size: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.7;
        }
        .post-card .post-content.expanded {
            -webkit-line-clamp: unset;
        }
        .post-card .post-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid var(--border);
            flex-wrap: wrap;
        }
        .post-card .post-meta .action-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: var(--text-secondary);
            padding: 4px 10px;
            border-radius: 30px;
            transition: var(--transition);
            background: transparent;
        }
        .post-card .post-meta .action-btn:hover {
            background: var(--primary-light);
            color: var(--primary);
        }
        .post-card .post-meta .action-btn.liked {
            color: var(--primary);
        }
        .post-card .post-meta .action-btn.liked i {
            font-weight: 900;
        }
        .post-card .post-meta .action-btn .count {
            font-weight: 500;
        }
        .post-card .post-meta .price-tag {
            margin-left: auto;
            background: #fef3c7;
            color: #d97706;
            padding: 2px 14px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
        }
        .post-card .post-meta .price-tag i {
            margin-right: 4px;
        }

        /* ===== 排行榜 ===== */
        .sidebar {
            position: sticky;
            top: calc(var(--nav-height) + 24px);
            align-self: start;
        }
        .sidebar .rank-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 20px 20px 12px;
            box-shadow: var(--shadow);
        }
        .sidebar .rank-card .rank-tabs {
            display: flex;
            gap: 4px;
            background: var(--bg);
            padding: 4px;
            border-radius: 30px;
            margin-bottom: 16px;
        }
        .sidebar .rank-card .rank-tabs button {
            flex: 1;
            padding: 6px 0;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            transition: var(--transition);
            text-align: center;
        }
        .sidebar .rank-card .rank-tabs button.active {
            background: var(--card-bg);
            color: var(--text);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
        }
        .sidebar .rank-list .rank-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: var(--transition);
        }
        .sidebar .rank-list .rank-item:last-child {
            border-bottom: none;
        }
        .sidebar .rank-list .rank-item:hover {
            background: var(--primary-light);
            margin: 0 -8px;
            padding-left: 8px;
            padding-right: 8px;
            border-radius: var(--radius-sm);
        }
        .sidebar .rank-list .rank-item .rank-num {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-secondary);
            flex-shrink: 0;
        }
        .sidebar .rank-list .rank-item .rank-num.top1 {
            background: #fef3c7;
            color: #d97706;
        }
        .sidebar .rank-list .rank-item .rank-num.top2 {
            background: #e5e7eb;
            color: #6b7280;
        }
        .sidebar .rank-list .rank-item .rank-num.top3 {
            background: #fde68a;
            color: #b45309;
        }
        .sidebar .rank-list .rank-item .rank-info {
            flex: 1;
            min-width: 0;
        }
        .sidebar .rank-list .rank-item .rank-info .r-title {
            font-weight: 500;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .sidebar .rank-list .rank-item .rank-info .r-meta {
            font-size: 12px;
            color: var(--text-secondary);
        }
        .sidebar .rank-list .rank-item .rank-value {
            font-weight: 600;
            font-size: 14px;
            color: var(--primary);
            flex-shrink: 0;
        }
        .sidebar .rank-empty {
            text-align: center;
            color: var(--text-secondary);
            padding: 20px 0;
            font-size: 14px;
        }

        /* ===== 发布页面 ===== */
        .page {
            display: none;
            animation: fadeUp 0.3s ease;
        }
        .page.active {
            display: block;
        }
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .page-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
        }
        .publish-box {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 28px 32px;
            box-shadow: var(--shadow);
            max-width: 720px;
        }
        .publish-box .form-group {
            margin-bottom: 18px;
        }
        .publish-box .form-group label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 6px;
        }
        .publish-box .form-group input,
        .publish-box .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg);
            transition: var(--transition);
            font-size: 15px;
        }
        .publish-box .form-group input:focus,
        .publish-box .form-group textarea:focus {
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(79, 124, 255, 0.12);
        }
        .publish-box .form-group textarea {
            min-height: 140px;
            resize: vertical;
        }
        .publish-box .form-group .input-hint {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        .publish-box .btn-publish {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            padding: 12px 40px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 16px;
            transition: var(--transition);
            box-shadow: 0 4px 14px rgba(79, 124, 255, 0.35);
        }
        .publish-box .btn-publish:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(79, 124, 255, 0.45);
        }

        /* ===== 帖子详情（模态框） ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
            animation: fadeIn 0.25s ease;
        }
        .modal-overlay.open {
            display: flex;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .modal-content {
            background: var(--card-bg);
            border-radius: var(--radius);
            max-width: 700px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 32px 36px;
            position: relative;
            animation: slideUp 0.3s ease;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.97);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .modal-content .modal-close {
            position: sticky;
            top: 0;
            float: right;
            font-size: 26px;
            color: var(--text-secondary);
            background: var(--bg);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            z-index: 10;
            margin-bottom: 8px;
        }
        .modal-content .modal-close:hover {
            background: #fee2e2;
            color: #dc2626;
        }
        .modal-content .detail-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .modal-content .detail-header .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--primary-light);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 18px;
            flex-shrink: 0;
        }
        .modal-content .detail-header .info .name {
            font-weight: 600;
            font-size: 16px;
        }
        .modal-content .detail-header .info .time {
            font-size: 13px;
            color: var(--text-secondary);
        }
        .modal-content .detail-title {
            font-size: 24px;
            font-weight: 700;
            margin: 8px 0 12px;
            line-height: 1.3;
        }
        .modal-content .detail-body {
            font-size: 16px;
            line-height: 1.8;
            color: var(--text-secondary);
            white-space: pre-wrap;
            word-break: break-word;
        }
        .modal-content .detail-meta {
            display: flex;
            align-items: center;
            gap: 20px;
            margin: 18px 0 20px;
            padding: 14px 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }
        .modal-content .detail-meta .action-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 15px;
            color: var(--text-secondary);
            padding: 4px 12px;
            border-radius: 30px;
            transition: var(--transition);
            background: transparent;
        }
        .modal-content .detail-meta .action-btn:hover {
            background: var(--primary-light);
            color: var(--primary);
        }
        .modal-content .detail-meta .action-btn.liked {
            color: var(--primary);
        }
        .modal-content .detail-meta .action-btn.liked i {
            font-weight: 900;
        }
        .modal-content .detail-meta .price-tag {
            background: #fef3c7;
            color: #d97706;
            padding: 2px 16px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
        }
        /* 评论 */
        .comments-section {
            margin-top: 20px;
        }
        .comments-section .comment-title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 12px;
        }
        .comments-section .comment-input {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }
        .comments-section .comment-input input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid var(--border);
            border-radius: 30px;
            background: var(--bg);
            transition: var(--transition);
            font-size: 14px;
        }
        .comments-section .comment-input input:focus {
            border-color: var(--primary);
            background: #fff;
        }
        .comments-section .comment-input button {
            padding: 10px 24px;
            background: var(--primary);
            color: #fff;
            border-radius: 30px;
            font-weight: 500;
            transition: var(--transition);
            flex-shrink: 0;
        }
        .comments-section .comment-input button:hover {
            background: var(--primary-dark);
        }
        .comments-section .comment-item {
            display: flex;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }
        .comments-section .comment-item:last-child {
            border-bottom: none;
        }
        .comments-section .comment-item .c-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--primary-light);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 13px;
            flex-shrink: 0;
        }
        .comments-section .comment-item .c-body .c-name {
            font-weight: 600;
            font-size: 14px;
        }
        .comments-section .comment-item .c-body .c-time {
            font-size: 12px;
            color: var(--text-secondary);
            margin-left: 8px;
        }
        .comments-section .comment-item .c-body .c-text {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 2px;
        }
        .comments-section .comment-empty {
            color: var(--text-secondary);
            font-size: 14px;
            text-align: center;
            padding: 16px 0;
        }

        /* ===== 个人中心 ===== */
        .profile-box {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 28px 32px;
            box-shadow: var(--shadow);
            max-width: 720px;
        }
        .profile-box .profile-head {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .profile-box .profile-head .big-avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: var(--primary-light);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: 700;
        }
        .profile-box .profile-head .p-info .p-name {
            font-size: 20px;
            font-weight: 700;
        }
        .profile-box .profile-head .p-info .p-joined {
            font-size: 14px;
            color: var(--text-secondary);
        }
        .profile-box .profile-posts .pp-title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 12px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }
        .profile-box .profile-posts .pp-item {
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: var(--transition);
        }
        .profile-box .profile-posts .pp-item:hover {
            background: var(--primary-light);
            margin: 0 -12px;
            padding-left: 12px;
            padding-right: 12px;
            border-radius: var(--radius-sm);
        }
        .profile-box .profile-posts .pp-item .pp-title-text {
            font-weight: 500;
        }
        .profile-box .profile-posts .pp-item .pp-meta {
            font-size: 13px;
            color: var(--text-secondary);
        }
        .profile-box .profile-empty {
            color: var(--text-secondary);
            text-align: center;
            padding: 30px 0;
        }

        // ================================================================
        //  TOAST
        // ================================================================
        let toastTimer = null;

        function showToast(msg, type = 'info') {
            if (toastTimer) { clearTimeout(toastTimer);
                toastEl.classList.remove('show'); }
            toastEl.textContent = msg;
            toastEl.className = 'toast ' + type;
            // 强制回流
            void toastEl.offsetWidth;
            toastEl.classList.add('show');
            toastTimer = setTimeout(() => {
                toastEl.classList.remove('show');
                toastTimer = null;
            }, 2800);
        }

        // ================================================================
        //  AUTH
        // ================================================================
        function getCurrentUser() {
            if (currentUser) return currentUser;
            const saved = sessionStorage.getItem('quUser');
            if (saved) {
                try {
                    const uid = parseInt(saved, 10);
                    const user = data.users.find(u => u.id === uid);
                    if (user) { currentUser = user; return user; }
                } catch (_) {}
            }
            return null;
        }

        function setCurrentUser(user) {
            currentUser = user;
            if (user) {
                sessionStorage.setItem('quUser', String(user.id));
            } else {
                sessionStorage.removeItem('quUser');
            }
            renderNav();
            renderFeed();
            renderRank();
            renderProfile();
        }

        function requireAuth() {
            const user = getCurrentUser();
            if (!user) {
                showToast('请先登录', 'error');
                openAuthModal();
                return null;
            }
            return user;
        }

        // ================================================================
        //  NAV
        // ================================================================
        function renderNav() {
            const user = getCurrentUser();
            if (user) {
                const initial = user.username.charAt(0).toUpperCase();
                userArea.innerHTML = `
                    <span class="avatar-sm">${initial}</span>
                    <span class="username">${user.username}</span>
                    <button class="btn-logout" id="btnLogout"><i class="fas fa-sign-out-alt"></i> 退出</button>
                `;
                const btnLogout = $('#btnLogout');
                if (btnLogout) btnLogout.addEventListener('click', () => {
                    setCurrentUser(null);
                    showToast('已退出', 'info');
                    closeAllModals();
                });
            } else {
                userArea.innerHTML = `
                    <button class="btn-login" id="btnLogin"><i class="fas fa-user-plus"></i> 登录 / 注册</button>

                const btnLogin = $('#btnLogin');
                if (btnLogin) btnLogin.addEventListener('click', openAuthModal);
            }

            $$('.page').forEach(el => el.classList.remove('active'));
            const target = $('#page-' + page);
            if (target) target.classList.add('active');
            // 更新导航高亮
            $$('.nav-links a').forEach(a => {
                a.classList.toggle('active', a.dataset.page === page);
            });
            // 关闭移动端菜单
            navLinks.classList.remove('open');
            // 如果进入发布页或个人中心，隐藏侧边栏? 但保留, 自适应
            if (page === 'publish' || page === 'profile') {
                $('#sidebar').style.display = 'none';
            } else {
                $('#sidebar').style.display = '';
            }
            if (page === 'home') {
                renderFeed();
                renderRank();
            }
            if (page === 'profile') {
                renderProfile();
            }
        }

        // 导航事件
        $$('.nav-links a').forEach(a => {
            a.addEventListener('click', (e) => {
                e.preventDefault();
                const page = a.dataset.page;
                if (page) navigateTo(page);
            });
        });

            const isLogin = authMode === 'login';
            authContent.innerHTML = `
                <div class="auth-title">${isLogin ? '登录' : '注册'}账号</div>
                <div class="auth-sub">${isLogin ? '欢迎回来！' : '加入趣社区，分享你的精彩'}</div>
                <form id="authForm" autocomplete="off">
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" id="authUsername" placeholder="请输入用户名" required />
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="authPassword" placeholder="请输入密码" required />
                    </div>
                    ${!isLogin ? `
                    <div class="form-group">
                        <label>确认密码</label>
                        <input type="password" id="authPassword2" placeholder="请再次输入密码" required />
                    </div>
                    ` : ''}
                    <button type="submit" class="btn-auth">${isLogin ? '登 录' : '注 册'}</button>
                </form>
                <div class="auth-switch">
                    ${isLogin ? '还没有账号？' : '已有账号？'}
                    <a id="authSwitch">${isLogin ? '去注册' : '去登录'}</a>
                </div>
            `;
            const form = $('#authForm');
            form.addEventListener('submit', handleAuthSubmit);
            const switchLink = $('#authSwitch');
            if (switchLink) {
                switchLink.addEventListener('click', () => {
                    authMode = authMode === 'login' ? 'register' : 'login';
                    renderAuthForm();
                });
            }
        }

        function handleAuthSubmit(e) {
            e.preventDefault();
            const username = $('#authUsername').value.trim();
            const password = $('#authPassword').value.trim();
            if (!username || !password) { showToast('请填写完整信息', 'error'); return; }
            if (authMode === 'login') {
                const user = data.users.find(u => u.username === username && u.password === password);
                if (!user) {
                    showToast('用户名或密码错误', 'error');
                    return;
                }
                setCurrentUser(user);
                showToast('登录成功！', 'success');
                closeAuthModal();
                renderFeed();
                renderRank();
                renderProfile();
            } else {
                const password2 = $('#authPassword2').value.trim();
                if (password !== password2) { showToast('两次密码输入不一致', 'error'); return; }
                if (data.users.find(u => u.username === username)) {
                    showToast('用户名已存在', 'error');
                    return;
                }
                const newUser = {
                    id: data.nextUserId++,
                    username,
                    password,
                    avatar: '',
                    joined: Date.now(),
                };
                data.users.push(newUser);
                saveData();
                setCurrentUser(newUser);
                showToast('注册成功！欢迎加入 🎉', 'success');
                closeAuthModal();
                renderFeed();
                renderRank();
                renderProfile();
            }
        }

        authClose.addEventListener('click', closeAuthModal);
        authModal.addEventListener('click', (e) => {
            if (e.target === authModal) closeAuthModal();
        });

        // ================================================================
        //  FEED
        // ================================================================
        function renderFeed() {
            const sort = currentSort;
            let posts = [...data.posts];
            if (sort === 'new') {
                posts.sort((a, b) => b.time - a.time);
            } else if (sort === 'hot') {
                posts.sort((a, b) => (b.likes.length + b.comments.length) - (a.likes.length + a.comments.length));
            }
            const user = getCurrentUser();
            if (posts.length === 0) {
                postList.innerHTML = `<div style="text-align:center;padding:60px 0;color:var(--text-secondary);">
                    <i class="fas fa-inbox" style="font-size:40px;display:block;margin-bottom:12px;"></i>
                    暂无帖子，快来发布第一条吧！
                </div>`;
                return;
            }
            let html = '';
            posts.forEach(p => {
                const liked = user ? p.likes.includes(user.id) : false;
                const commentCount = p.comments ? p.comments.length : 0;
                const price = p.price || 0;
                html += `
                    <div class="post-card" data-id="${p.id}">
                        <div class="post-header">
                            <div class="avatar">${p.authorName.charAt(0).toUpperCase()}</div>
                            <div class="info">
                                <div class="name">${p.authorName}</div>
                                <div class="time">${formatTime(p.time)}</div>
                            </div>
                        </div>
                        <div class="post-title">${escapeHtml(p.title)}</div>
                        <div class="post-content">${escapeHtml(p.content)}</div>
                        <div class="post-meta">
                            <button class="action-btn like-btn ${liked ? 'liked' : ''}" data-id="${p.id}">
                                <i class="${liked ? 'fas' : 'far'} fa-heart"></i>
                                <span class="count">${p.likes.length}</span>
                            </button>
                            <button class="action-btn comment-btn" data-id="${p.id}">
                                <i class="far fa-comment"></i>
                                <span class="count">${commentCount}</span>
                            </button>
                            <button class="action-btn share-btn" data-id="${p.id}">
                                <i class="fas fa-share-square"></i>
                                <span class="count">${p.shares || 0}</span>
                            </button>
                            ${price > 0 ? `<span class="price-tag"><i class="fas fa-coins"></i> ¥${price.toFixed(2)}</span>` : ''}
                        </div>
                    </div>
                `;
            });
            postList.innerHTML = html;

            // 事件：点击卡片打开详情
            $$('.post-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    // 如果点击的是按钮，不触发
                    if (e.target.closest('.action-btn')) return;
                    const id = parseInt(card.dataset.id, 10);
                    if (id) openDetail(id);
                });
            });

            // 点赞
            $$('.like-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = parseInt(btn.dataset.id, 10);
                    if (id) toggleLike(id);
                });
            });

            // 评论
            $$('.comment-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = parseInt(btn.dataset.id, 10);
                    if (id) openDetail(id);
                });
            });

            // 分享
            $$('.share-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = parseInt(btn.dataset.id, 10);
                    if (id) openShare(id);
                });
            });
        }

        // feed tabs
        feedTabs.addEventListener('click', (e) => {
            const btn = e.target.closest('button');
            if (!btn) return;
            const sort = btn.dataset.sort;
            if (!sort) return;
            $$('.feed-header .tabs button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentSort = sort;
            renderFeed();
        });

        // ================================================================
        //  RANK
        // ================================================================
        function renderRank() {
            const type = currentRank;
            let list = [...data.posts];
            if (type === 'discuss') {
                list.sort((a, b) => (b.likes.length + b.comments.length) - (a.likes.length + a.comments.length));
            } else if (type === 'likes') {
                list.sort((a, b) => b.likes.length - a.likes.length);
            } else if (type === 'price') {
                list.sort((a, b) => (b.price || 0) - (a.price || 0));
            }
            const top = list.slice(0, 10);
            if (top.length === 0) {
                rankList.innerHTML = `<div class="rank-empty">暂无数据</div>`;
                return;
            }
            let html = '';
            top.forEach((p, idx) => {
                const numClass = idx === 0 ? 'top1' : idx === 1 ? 'top2' : idx === 2 ? 'top3' : '';
                let value = '';
                if (type === 'discuss') value = (p.likes.length + p.comments.length) + ' 互动';
                else if (type === 'likes') value = p.likes.length + ' 赞';
                else if (type === 'price') value = '¥' + (p.price || 0).toFixed(2);
                html += `
                    <div class="rank-item" data-id="${p.id}">
                        <div class="rank-num ${numClass}">${idx + 1}</div>
                        <div class="rank-info">
                            <div class="r-title">${escapeHtml(p.title)}</div>
                            <div class="r-meta">${p.authorName} · ${formatTime(p.time)}</div>
                        </div>
                        <div class="rank-value">${value}</div>
                    </div>
                `;
            });
            rankList.innerHTML = html;
            $$('.rank-item').forEach(item => {
                item.addEventListener('click', () => {
                    const id = parseInt(item.dataset.id, 10);
                    if (id) openDetail(id);
                });
            });
        }

        rankTabs.addEventListener('click', (e) => {
            const btn = e.target.closest('button');
            if (!btn) return;
            const rank = btn.dataset.rank;
            if (!rank) return;
            $$('.rank-tabs button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentRank = rank;
            renderRank();
        });

        // ================================================================
        //  DETAIL
        // ================================================================
        function openDetail(postId) {
            const post = data.posts.find(p => p.id === postId);
            if (!post) { showToast('帖子不存在', 'error'); return; }
            viewingPostId = postId;
            // 增加浏览量
            post.views = (post.views || 0) + 1;
            saveData();

            const user = getCurrentUser();
            const liked = user ? post.likes.includes(user.id) : false;
            const commentCount = post.comments ? post.comments.length : 0;
            const price = post.price || 0;

            let commentsHtml = '';
            if (post.comments && post.comments.length > 0) {
                post.comments.forEach(c => {
                    const cName = c.authorName || '匿名';
                    commentsHtml += `
                        <div class="comment-item">
                            <div class="c-avatar">${cName.charAt(0).toUpperCase()}</div>
                            <div class="c-body">
                                <span class="c-name">${cName}</span>
                                <span class="c-time">${formatTime(c.time)}</span>
                                <div class="c-text">${escapeHtml(c.content)}</div>
                            </div>
                        </div>
                    `;
                });
            } else {
                commentsHtml = `<div class="comment-empty">暂无评论，来说点什么吧</div>`;
            }

            detailContent.innerHTML = `
                <div class="detail-header">
                    <div class="avatar">${post.authorName.charAt(0).toUpperCase()}</div>
                    <div class="info">
                        <div class="name">${post.authorName}</div>
                        <div class="time">${formatTime(post.time)} · ${post.views || 0} 次浏览</div>
                    </div>
                </div>
                <div class="detail-title">${escapeHtml(post.title)}</div>
                <div class="detail-body">${escapeHtml(post.content)}</div>
                <div class="detail-meta">
                    <button class="action-btn like-btn ${liked ? 'liked' : ''}" data-id="${post.id}">
                        <i class="${liked ? 'fas' : 'far'} fa-heart"></i>
                        <span class="count">${post.likes.length}</span>
                    </button>
                    <button class="action-btn comment-btn" data-id="${post.id}">
                        <i class="far fa-comment"></i>
                        <span class="count">${commentCount}</span>
                    </button>
                    <button class="action-btn share-btn" data-id="${post.id}">
                        <i class="fas fa-share-square"></i>
                        <span class="count">${post.shares || 0}</span>
                    </button>
                    ${price > 0 ? `<span class="price-tag"><i class="fas fa-coins"></i> 付费 ¥${price.toFixed(2)}</span>` : ''}
                </div>
                <div class="comments-section">
                    <div class="comment-title"><i class="far fa-comment-dots"></i> 评论 (${commentCount})</div>
                    <div class="comment-input">
                        <input type="text" id="commentInput" placeholder="写下你的评论..." />
                        <button id="commentSubmit">发送</button>
                    </div>
                    <div id="commentList">${commentsHtml}</div>
                </div>
            `;

            detailModal.classList.add('open');

            // 点赞
            const likeBtn = detailContent.querySelector('.like-btn');
            if (likeBtn) {
                likeBtn.addEventListener('click', () => {
                    const id = parseInt(likeBtn.dataset.id, 10);
                    if (id) toggleLike(id);
                });
            }

            // 评论提交
            const commentInput = detailContent.querySelector('#commentInput');
            const commentSubmit = detailContent.querySelector('#commentSubmit');
            if (commentSubmit && commentInput) {
                const submitComment = () => {
                    const text = commentInput.value.trim();
                    if (!text) { showToast('请输入评论内容', 'error'); return; }
                    const user = requireAuth();
                    if (!user) return;
                    const post = data.posts.find(p => p.id === postId);
                    if (!post) return;
                    if (!post.comments) post.comments = [];
                    post.comments.push({
                        id: 'c' + Date.now() + Math.random().toString(36).slice(2, 6),
                        authorId: user.id,
                        authorName: user.username,
                        content: text,
                        time: Date.now(),
                    });
                    saveData();
                    commentInput.value = '';
                    showToast('评论成功！', 'success');
                    openDetail(postId); // 刷新
                    renderFeed();
                    renderRank();
                };
                commentSubmit.addEventListener('click', submitComment);
                commentInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') submitComment();
                });
            }

            // 分享
            const shareBtn = detailContent.querySelector('.share-btn');
            if (shareBtn) {
                shareBtn.addEventListener('click', () => {
                    const id = parseInt(shareBtn.dataset.id, 10);
                    if (id) openShare(id);
                });
            }
        }

        detailClose.addEventListener('click', () => {
            detailModal.classList.remove('open');
            renderFeed();
            renderRank();
        });
        detailModal.addEventListener('click', (e) => {
            if (e.target === detailModal) {
                detailModal.classList.remove('open');
                renderFeed();
                renderRank();
            }
        });

        // ================================================================
        //  LIKE
        // ================================================================
        function toggleLike(postId) {
            const user = requireAuth();
            if (!user) return;
            const post = data.posts.find(p => p.id === postId);
            if (!post) { showToast('帖子不存在', 'error'); return; }
            const idx = post.likes.indexOf(user.id);
            if (idx > -1) {
                post.likes.splice(idx, 1);
                showToast('已取消点赞', 'info');
            } else {
                post.likes.push(user.id);
                showToast('点赞成功 ❤️', 'success');
            }
            saveData();
            renderFeed();
            renderRank();
            // 如果详情打开，刷新详情
            if (detailModal.classList.contains('open') && viewingPostId === postId) {
                openDetail(postId);
            }
        }

        // ================================================================
        //  SHARE
        // ================================================================
        function openShare(postId) {
            const post = data.posts.find(p => p.id === postId);
            if (!post) { showToast('帖子不存在', 'error'); return; }
            sharePostId = postId;
            // 增加分享数
            post.shares = (post.shares || 0) + 1;
            saveData();
            const url = window.location.href.split('?')[0] + '?post=' + postId;
            shareLinkInput.value = url;
            shareModal.classList.add('open');
            renderFeed();
            renderRank();
        }

        shareCopyBtn.addEventListener('click', () => {
            const val = shareLinkInput.value;
            if (navigator.clipboard) {
                navigator.clipboard.writeText(val).then(() => {
                    showToast('链接已复制！', 'success');
                }).catch(() => {
                    fallbackCopy(val);
                });
            } else {
                fallbackCopy(val);
            }
        });

        function fallbackCopy(text) {
            shareLinkInput.select();
            try {
                document.execCommand('copy');
                showToast('链接已复制！', 'success');
            } catch (_) {
                showToast('复制失败，请手动复制', 'error');
            }
        }

        shareClose.addEventListener('click', () => shareModal.classList.remove('open'));
        shareModal.addEventListener('click', (e) => {
            if (e.target === shareModal) shareModal.classList.remove('open');
        });

        // ================================================================
        //  PUBLISH
        // ================================================================
        btnPublish.addEventListener('click', () => {
            const user = requireAuth();
            if (!user) return;
            const title = pubTitle.value.trim();
            const content = pubContent.value.trim();
            const price = parseFloat(pubPrice.value) || 0;
            if (!title) { showToast('请输入标题', 'error');
                pubTitle.focus(); return; }
            if (!content) { showToast('请输入内容', 'error');
                pubContent.focus(); return; }
            if (price < 0) { showToast('金额不能为负数', 'error'); return; }

            const newPost = {
                id: data.nextPostId++,
                title,
                content,
                authorId: user.id,
                authorName: user.username,
                time: Date.now(),
                likes: [],
                comments: [],
                views: 0,
                shares: 0,
                price: price,
            };
            data.posts.unshift(newPost);
            saveData();
            pubTitle.value = '';
            pubContent.value = '';
            pubPrice.value = '0';
            showToast('发布成功！🎉', 'success');
            navigateTo('home');
            renderFeed();
            renderRank();
        });

        // ================================================================
        //  PROFILE
        // ================================================================
        function renderProfile() {
            const user = getCurrentUser();
            if (!user) {
                profileBox.innerHTML = `
                    <div class="profile-empty">
                        <i class="fas fa-user-circle" style="font-size:48px;color:var(--text-secondary);display:block;margin-bottom:12px;"></i>
                        请先登录查看个人中心
                        <br /><br />
                        <button class="btn-login" style="background:var(--primary);color:#fff;padding:10px 32px;border-radius:30px;font-weight:500;" onclick="openAuthModal()">
                            去登录
                        </button>
                    </div>
                `;
                return;
            }
            const userPosts = data.posts.filter(p => p.authorId === user.id);
            let postsHtml = '';
            if (userPosts.length === 0) {
                postsHtml = `<div class="profile-empty">你还没有发布过帖子</div>`;
            } else {
                userPosts.forEach(p => {
                    postsHtml += `
                        <div class="pp-item" data-id="${p.id}">
                            <div class="pp-title-text">${escapeHtml(p.title)}</div>
                            <div class="pp-meta">${formatTime(p.time)} · ${p.likes.length} 赞 · ${p.comments ? p.comments.length : 0} 评论</div>
                        </div>
                    `;
                });
            }

            profileBox.innerHTML = `
                <div class="profile-head">
                    <div class="big-avatar">${user.username.charAt(0).toUpperCase()}</div>
                    <div class="p-info">
                        <div class="p-name">${user.username}</div>
                        <div class="p-joined">加入于 ${formatTime(user.joined)}</div>
                    </div>
                </div>
                <div class="profile-posts">
                    <div class="pp-title">我的帖子 (${userPosts.length})</div>
                    ${postsHtml}
                </div>
            `;

            $$('.pp-item').forEach(item => {
                item.addEventListener('click', () => {
                    const id = parseInt(item.dataset.id, 10);
                    if (id) openDetail(id);
                });
            });
        }

        // ================================================================
        //  UTILITY
        // ================================================================
        function formatTime(ts) {
            if (!ts) return '刚刚';
            const diff = Date.now() - ts;
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return Math.floor(diff / 60000) + ' 分钟前';
            if (diff < 86400000) return Math.floor(diff / 3600000) + ' 小时前';
            if (diff < 172800000) return '昨天';
            if (diff < 259200000) return '前天';
            const d = new Date(ts);
            const pad = n => String(n).padStart(2, '0');
            return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d
                .getMinutes());
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function closeAllModals() {
            detailModal.classList.remove('open');
            authModal.classList.remove('open');
            shareModal.classList.remove('open');
        }

        // ================================================================
        //  ROUTE: 如果 URL 有 ?post= 参数，自动打开
        // ================================================================
        function handleUrlParams() {
            const params = new URLSearchParams(window.location.search);
            const postId = params.get('post');
            if (postId) {
                const id = parseInt(postId, 10);
                if (!isNaN(id)) {
                    setTimeout(() => openDetail(id), 300);
                }
            }
        }

        // ================================================================
        //  INIT
        // ================================================================
        function init() {
            const user = getCurrentUser();
            if (user) currentUser = user;
            renderNav();
            renderFeed();
            renderRank();
            renderProfile();
            handleUrlParams();

            // 点击页面空白关闭移动端菜单
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.navbar')) {
                    navLinks.classList.remove('open');
                }
            });
        }

        // 暴露一些函数给全局（用于内联 onclick）
        window.openAuthModal = openAuthModal;
        window.openDetail = openDetail;

        init();

        // 监听 storage 变化（其他标签页）
        window.addEventListener('storage', (e) => {
            if (e.key === STORAGE_KEY) {
                data = loadData();
                renderFeed();
                renderRank();
                renderProfile();
            }
        });

        console.log('🌟 趣社区已启动！数据存储在 localStorage 中。');
        console.log('📦 当前数据:', data);
    </script>
</body>
</html>
