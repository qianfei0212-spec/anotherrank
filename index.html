<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>趣社区 - 自由分享交流</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <!-- 引入外部 CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- ===== Toast 提示 ===== -->
    <div id="toast" class="toast"></div>

    <!-- ===== 导航栏 ===== -->
    <nav class="navbar" id="navbar">
        <div class="logo">
            <i class="fas fa-comment-dots"></i> 趣社区
        </div>
        <button class="nav-toggle" id="navToggle" aria-label="菜单">
            <i class="fas fa-bars"></i>
        </button>
        <div class="nav-links" id="navLinks">
            <a href="#" class="active" data-page="home"><i class="fas fa-home"></i> 首页</a>
            <a href="#" data-page="publish"><i class="fas fa-pen"></i> 发布</a>
            <a href="#" data-page="profile"><i class="fas fa-user"></i> 我的</a>
        </div>
        <div class="user-area" id="userArea">
            <!-- 由 JS 渲染 -->
        </div>
    </nav>

    <!-- ===== 主容器 ===== -->
    <div class="container" id="appContainer">

        <!-- ===== 首页 ===== -->
        <div class="page active" id="page-home">
            <div class="feed-header">
                <h2><i class="fas fa-rss" style="color:var(--primary);margin-right:8px;"></i>最新动态</h2>
                <div class="tabs" id="feedTabs">
                    <button class="active" data-sort="new">最新</button>
                    <button data-sort="hot">热门</button>
                </div>
            </div>
            <div id="postList">
                <!-- 由 JS 渲染 -->
            </div>
        </div>

        <!-- ===== 发布页 ===== -->
        <div class="page" id="page-publish">
            <div class="page-title"><i class="fas fa-feather-alt" style="color:var(--primary);margin-right:10px;"></i>发布帖子</div>
            <div class="publish-box">
                <div class="form-group">
                    <label>标题 <span style="color:#ef4444;">*</span></label>
                    <input type="text" id="pubTitle" placeholder="输入标题..." maxlength="80" />
                </div>
                <div class="form-group">
                    <label>内容 <span style="color:#ef4444;">*</span></label>
                    <textarea id="pubContent" placeholder="分享你的想法..." maxlength="5000"></textarea>
                </div>
                <div class="form-group">
                    <label>付费金额 (元) <span style="color:var(--text-secondary);font-weight:400;font-size:13px;">— 设为0则免费</span></label>
                    <input type="number" id="pubPrice" placeholder="0" min="0" step="0.01" value="0" />
                </div>
                <button class="btn-publish" id="btnPublish"><i class="fas fa-paper-plane" style="margin-right:8px;"></i>发布</button>
            </div>
        </div>

        <!-- ===== 个人中心 ===== -->
        <div class="page" id="page-profile">
            <div class="page-title"><i class="fas fa-user-circle" style="color:var(--primary);margin-right:10px;"></i>个人中心</div>
            <div class="profile-box" id="profileBox">
                <!-- 由 JS 渲染 -->
            </div>
        </div>

        <!-- ===== 侧边栏 (排行榜) ===== -->
        <aside class="sidebar" id="sidebar">
            <div class="rank-card">
                <h3 style="font-size:17px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;">
                    <i class="fas fa-trophy" style="color:#f59e0b;"></i> 排行榜
                </h3>
                <div class="rank-tabs" id="rankTabs">
                    <button class="active" data-rank="discuss">讨论度</button>
                    <button data-rank="likes">点赞量</button>
                    <button data-rank="price">付费最高</button>
                </div>
                <div class="rank-list" id="rankList">
                    <!-- 由 JS 渲染 -->
                </div>
            </div>
        </aside>
    </div>

    <!-- ===== 帖子详情模态框 ===== -->
    <div class="modal-overlay" id="detailModal">
        <div class="modal-content">
            <button class="modal-close" id="detailClose"><i class="fas fa-times"></i></button>
            <div id="detailContent">
                <!-- 由 JS 渲染 -->
            </div>
        </div>
    </div>

    <!-- ===== 登录/注册模态框 ===== -->
    <div class="modal-overlay auth-modal" id="authModal">
        <div class="modal-content">
            <button class="modal-close" id="authClose"><i class="fas fa-times"></i></button>
            <div id="authContent">
                <!-- 由 JS 渲染 -->
            </div>
        </div>
    </div>

    <!-- ===== 分享模态框 ===== -->
    <div class="modal-overlay share-modal" id="shareModal">
        <div class="modal-content">
            <button class="modal-close" id="shareClose"><i class="fas fa-times"></i></button>
            <div class="share-icon"><i class="fas fa-share-alt"></i></div>
            <div class="share-title">分享这篇帖子</div>
            <div class="share-desc">复制链接或分享到社交平台</div>
            <div class="share-link-box">
                <input type="text" id="shareLinkInput" readonly />
                <button id="shareCopyBtn"><i class="fas fa-copy"></i> 复制</button>
            </div>
            <div class="share-social">
                <button title="微信"><i class="fab fa-weixin"></i></button>
                <button title="微博"><i class="fab fa-weibo"></i></button>
                <button title="QQ"><i class="fab fa-qq"></i></button>
                <button title="Twitter"><i class="fab fa-twitter"></i></button>
            </div>
        </div>
    </div>

    <!-- 引入外部 JavaScript -->
    <script src="script.js"></script>
</body>
</html>
