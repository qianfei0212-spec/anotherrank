<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>趣社区 - 自由分享交流</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        /* ===== 基础样式 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
            background: #F0F2F5;
            color: #1a1a2e;
            padding-top: 64px;
            line-height: 1.6;
        }

        /* ===== 导航栏 ===== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: #fff;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 1000;
        }
        .navbar .logo {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #4F7CFF, #6C5CE7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .navbar .logo i {
            -webkit-text-fill-color: #4F7CFF;
        }
        .navbar .nav-links {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .navbar .nav-links a {
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 500;
            color: #6b7280;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .navbar .nav-links a:hover {
            background: #e8eeff;
            color: #4F7CFF;
        }
        .navbar .nav-links a.active {
            background: #4F7CFF;
            color: #fff;
        }
        .navbar .user-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .navbar .user-area .avatar-sm {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: #e8eeff;
            color: #4F7CFF;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 15px;
            flex-shrink: 0;
        }
        .navbar .user-area .avatar-sm img {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            object-fit: cover;
        }
        .navbar .user-area .username {
            font-weight: 500;
            font-size: 14px;
            color: #1a1a2e;
        }
        .navbar .user-area .btn-login {
            background: #4F7CFF;
            color: #fff;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .navbar .user-area .btn-login:hover {
            background: #3a5fd9;
        }
        .navbar .user-area .btn-logout {
            color: #6b7280;
            padding: 6px 12px;
            border-radius: 30px;
            border: none;
            background: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .navbar .user-area .btn-logout:hover {
            background: #fee2e2;
            color: #dc2626;
        }

        /* ===== 容器 ===== */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 20px;
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 28px;
        }
        @media (max-width: 960px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        /* ===== 页面切换 ===== */
        .page {
            display: none;
        }
        .page.active {
            display: block;
        }

        /* ===== 帖子列表 ===== */
        .feed-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .feed-header h2 {
            font-size: 22px;
            font-weight: 700;
        }
        .feed-header .tabs {
            display: flex;
            gap: 4px;
            background: #F0F2F5;
            padding: 4px;
            border-radius: 30px;
        }
        .feed-header .tabs button {
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            color: #6b7280;
            border: none;
            background: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .feed-header .tabs button.active {
            background: #fff;
            color: #1a1a2e;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
        }

        .post-card {
            background: #fff;
            border-radius: 16px;
            padding: 20px 24px;
            margin-bottom: 16px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            cursor: pointer;
            transition: all 0.2s;
        }
        .post-card:hover {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
        }
        .post-card .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }
        .post-card .post-header .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #e8eeff;
            color: #4F7CFF;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 16px;
            flex-shrink: 0;
        }
        .post-card .post-header .info .name {
            font-weight: 600;
            font-size: 15px;
        }
        .post-card .post-header .info .time {
            font-size: 13px;
            color: #6b7280;
        }
        .post-card .post-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .post-card .post-content {
            color: #6b7280;
            font-size: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .post-card .post-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid #e5e7eb;
            flex-wrap: wrap;
        }
        .post-card .post-meta .action-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: #6b7280;
            padding: 4px 10px;
            border-radius: 30px;
            border: none;
            background: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .post-card .post-meta .action-btn:hover {
            background: #e8eeff;
            color: #4F7CFF;
        }
        .post-card .post-meta .action-btn.liked {
            color: #4F7CFF;
        }
        .post-card .post-meta .price-tag {
            margin-left: auto;
            background: #fef3c7;
            color: #d97706;
            padding: 2px 14px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
        }

        /* ===== 排行榜 ===== */
        .sidebar {
            position: sticky;
            top: 88px;
            align-self: start;
        }
        .rank-card {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        }
        .rank-card h3 {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .rank-tabs {
            display: flex;
            gap: 4px;
            background: #F0F2F5;
            padding: 4px;
            border-radius: 30px;
            margin-bottom: 16px;
        }
        .rank-tabs button {
            flex: 1;
            padding: 6px 0;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            color: #6b7280;
            border: none;
            background: none;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }
        .rank-tabs button.active {
            background: #fff;
            color: #1a1a2e;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
        }
        .rank-list .rank-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid #e5e7eb;
            cursor: pointer;
            transition: all 0.2s;
        }
        .rank-list .rank-item:hover {
            background: #e8eeff;
            margin: 0 -8px;
            padding-left: 8px;
            padding-right: 8px;
            border-radius: 10px;
        }
        .rank-list .rank-item .rank-num {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: #F0F2F5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            color: #6b7280;
            flex-shrink: 0;
        }
        .rank-list .rank-item .rank-num.top1 {
            background: #fef3c7;
            color: #d97706;
        }
        .rank-list .rank-item .rank-num.top2 {
            background: #e5e7eb;
            color: #6b7280;
        }
        .rank-list .rank-item .rank-num.top3 {
            background: #fde68a;
            color: #b45309;
        }
        .rank-list .rank-item .rank-info {
            flex: 1;
            min-width: 0;
        }
        .rank-list .rank-item .rank-info .r-title {
            font-weight: 500;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .rank-list .rank-item .rank-info .r-meta {
            font-size: 12px;
            color: #6b7280;
        }
        .rank-list .rank-item .rank-value {
            font-weight: 600;
            font-size: 14px;
            color: #4F7CFF;
            flex-shrink: 0;
        }
        .rank-empty {
            text-align: center;
            color: #6b7280;
            padding: 20px 0;
            font-size: 14px;
        }

        /* ===== 发布页面 ===== */
        .page-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
        }
        .publish-box {
            background: #fff;
            border-radius: 16px;
            padding: 28px 32px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            max-width: 720px;
        }
        .publish-box .form-group {
            margin-bottom: 18px;
        }
        .publish-box .form-group label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 6px;
        }
        .publish-box .form-group input,
        .publish-box .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            background: #F0F2F5;
            font-size: 15px;
            transition: all 0.2s;
        }
        .publish-box .form-group input:focus,
        .publish-box .form-group textarea:focus {
            border-color: #4F7CFF;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(79, 124, 255, 0.12);
            outline: none;
        }
        .publish-box .form-group textarea {
            min-height: 140px;
            resize: vertical;
        }
        .btn-publish {
            background: linear-gradient(135deg, #4F7CFF, #6C5CE7);
            color: #fff;
            padding: 12px 40px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-publish:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 14px rgba(79, 124, 255, 0.35);
        }

        /* ===== 个人中心（头像功能核心样式） ===== */
        .profile-box {
            background: #fff;
            border-radius: 16px;
            padding: 28px 32px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            max-width: 720px;
        }
        .profile-head {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .profile-head .p-info {
            flex: 1;
        }
        .profile-head .p-info .p-name {
            font-size: 20px;
            font-weight: 700;
        }
        .profile-head .p-info .p-joined {
            font-size: 14px;
            color: #6b7280;
        }

        /* ===== 头像容器（最重要！） ===== */
        .avatar-wrapper {
            position: relative;
            cursor: pointer;
            width: 72px;
            height: 72px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
        }
        .avatar-wrapper .big-avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #e8eeff;
            color: #4F7CFF;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: 700;
        }
        .avatar-wrapper img {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
        }

        /* ===== 悬停遮罩层 ===== */
        .avatar-overlay {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.55);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: #fff;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }
        .avatar-overlay i {
            font-size: 24px;
            margin-bottom: 2px;
        }
        .avatar-overlay span {
            font-size: 12px;
            opacity: 0.9;
        }
        /* 鼠标悬停时显示遮罩 */
        .avatar-wrapper:hover .avatar-overlay {
            display: flex !important;
        }

        .btn-change-avatar {
            margin-top: 6px;
            padding: 4px 16px;
            background: #e8eeff;
            color: #4F7CFF;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-change-avatar:hover {
            background: #4F7CFF;
            color: #fff;
        }

        .profile-posts .pp-title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 12px;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 8px;
        }
        .profile-posts .pp-item {
            padding: 10px 0;
            border-bottom: 1px solid #e5e7eb;
            cursor: pointer;
            transition: all 0.2s;
        }
        .profile-posts .pp-item:hover {
            background: #e8eeff;
            margin: 0 -12px;
            padding-left: 12px;
            padding-right: 12px;
            border-radius: 10px;
        }
        .profile-posts .pp-item .pp-title-text {
            font-weight: 500;
        }
        .profile-posts .pp-item .pp-meta {
            font-size: 13px;
            color: #6b7280;
        }
        .profile-empty {
            color: #6b7280;
            text-align: center;
            padding: 30px 0;
        }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2937;
            color: #fff;
            padding: 12px 28px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.35s ease;
            pointer-events: none;
            max-width: 90vw;
            text-align: center;
        }
        .toast.show {
            opacity: 1;
        }
        .toast.success {
            background: #065f46;
        }
        .toast.error {
            background: #991b1b;
        }
        .toast.info {
            background: #1e40af;
        }

        /* ===== 模态框 ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }
        .modal-overlay.open {
            display: flex;
        }
        .modal-content {
            background: #fff;
            border-radius: 16px;
            max-width: 420px;
            width: 100%;
            padding: 32px 28px;
            position: relative;
            animation: fadeIn 0.25s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        .modal-content .modal-close {
            position: absolute;
            top: 12px;
            right: 16px;
            font-size: 24px;
            color: #6b7280;
            background: none;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .modal-content .modal-close:hover {
            color: #dc2626;
        }

        .auth-title {
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 6px;
        }
        .auth-sub {
            text-align: center;
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 14px;
        }
        .form-group label {
            display: block;
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 4px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            background: #F0F2F5;
            font-size: 15px;
            transition: all 0.2s;
        }
        .form-group input:focus {
            border-color: #4F7CFF;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(79, 124, 255, 0.12);
            outline: none;
        }
        .btn-auth {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #4F7CFF, #6C5CE7);
            color: #fff;
            border-radius: 30px;
            font-weight: 600;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 6px;
        }
        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 14px rgba(79, 124, 255, 0.35);
        }
        .auth-switch {
            text-align: center;
            font-size: 14px;
            color: #6b7280;
            margin-top: 16px;
        }
        .auth-switch a {
            color: #4F7CFF;
            font-weight: 600;
            cursor: pointer;
        }
        .auth-switch a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div id="toast" class="toast"></div>

    <!-- ===== 导航栏 ===== -->
    <nav class="navbar" id="navbar">
        <div class="logo"><i class="fas fa-comment-dots"></i> 趣社区</div>
        <div class="nav-links" id="navLinks">
            <a href="#" class="active" data-page="home"><i class="fas fa-home"></i> 首页</a>
            <a href="#" data-page="publish"><i class="fas fa-pen"></i> 发布</a>
            <a href="#" data-page="profile"><i class="fas fa-user"></i> 我的</a>
        </div>
        <div class="user-area" id="userArea">
            <!-- 由 JS 渲染 -->
        </div>
    </nav>

    <!-- ===== 主容器 ===== -->
    <div class="container">
        <!-- 左侧内容 -->
        <div>
            <!-- 首页 -->
            <div class="page active" id="page-home">
                <div class="feed-header">
                    <h2><i class="fas fa-rss" style="color:#4F7CFF;margin-right:8px;"></i>最新动态</h2>
                    <div class="tabs" id="feedTabs">
                        <button class="active" data-sort="new">最新</button>
                        <button data-sort="hot">热门</button>
                    </div>
                </div>
                <div id="postList"></div>
            </div>

            <!-- 发布页 -->
            <div class="page" id="page-publish">
                <div class="page-title"><i class="fas fa-feather-alt" style="color:#4F7CFF;margin-right:10px;"></i>发布帖子</div>
                <div class="publish-box">
                    <div class="form-group">
                        <label>标题 <span style="color:#ef4444;">*</span></label>
                        <input type="text" id="pubTitle" placeholder="输入标题..." maxlength="80" />
                    </div>
                    <div class="form-group">
                        <label>内容 <span style="color:#ef4444;">*</span></label>
                        <textarea id="pubContent" placeholder="分享你的想法..." maxlength="5000"></textarea>
                    </div>
                    <div class="form-group">
                        <label>付费金额 (元) <span style="color:#6b7280;font-weight:400;font-size:13px;">— 设为0则免费</span></label>
                        <input type="number" id="pubPrice" placeholder="0" min="0" step="0.01" value="0" />
                    </div>
                    <button class="btn-publish" id="btnPublish"><i class="fas fa-paper-plane" style="margin-right:8px;"></i>发布</button>
                </div>
            </div>

            <!-- 个人中心 -->
            <div class="page" id="page-profile">
                <div class="page-title"><i class="fas fa-user-circle" style="color:#4F7CFF;margin-right:10px;"></i>个人中心</div>
                <div class="profile-box" id="profileBox">
                    <!-- 由 JS 渲染 -->
                </div>
            </div>
        </div>

        <!-- 右侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="rank-card">
                <h3><i class="fas fa-trophy" style="color:#f59e0b;"></i> 排行榜</h3>
                <div class="rank-tabs" id="rankTabs">
                    <button class="active" data-rank="discuss">讨论度</button>
                    <button data-rank="likes">点赞量</button>
                    <button data-rank="price">付费最高</button>
                </div>
                <div class="rank-list" id="rankList">
                    <!-- 由 JS 渲染 -->
                </div>
            </div>
        </aside>
    </div>

    <!-- ===== 登录模态框 ===== -->
    <div class="modal-overlay" id="authModal">
        <div class="modal-content">
            <button class="modal-close" id="authClose"><i class="fas fa-times"></i></button>
            <div id="authContent">
                <!-- 由 JS 渲染 -->
            </div>
        </div>
    </div>

    <!-- ================================================================ -->
    <!-- JavaScript -->
    <!-- ================================================================ -->
    <script>
        // ================================================================
        // DATA LAYER
        // ================================================================
        const STORAGE_KEY = 'quCommunityData';
        let data = loadData();

        function getDefaultData() {
            return { users: [], posts: [], nextUserId: 1, nextPostId: 1 };
        }

        function loadData() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) {
                    const parsed = JSON.parse(raw);
                    const def = getDefaultData();
                    for (const k in def) {
                        if (!(k in parsed)) parsed[k] = def[k];
                    }
                    return parsed;
                }
            } catch (_) {}
            return getDefaultData();
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        // ================================================================
        // SAMPLE DATA
        // ================================================================
        function initSampleData() {
            if (data.users.length > 0) return;
            const now = Date.now();

                { id: 2, username: '月光', password: '123456', avatar: '', joined: now - 86400000 * 20 },

                { id: 1, title: '分享我最近的摄影作品', content: '周末去了郊外，拍到了绝美的日落。金色的阳光洒在田野上，一切都那么宁静美好。', authorId: 1,

                { id: 4, title: '2026 年值得关注的 5 个科技趋势', content: '1. 边缘计算 2. 生成式 AI 3. 量子计算 4. 脑机接口 5. 可持续能源。', authorId: 4,

                { id: 5, title: '我的读书笔记：<人类群星闪耀时>', content: '茨威格的这本书让我深受触动。历史的关键时刻，往往由少数人的勇气和决断所决定。', authorId: 1,
                    authorName: '星辰', time: now - 3600000 * 24, likes: [4], comments: [], views: 56, shares: 4,
                    price: 0 },

            data.nextPostId = 6;

        initSampleData();

        // ================================================================
        // STATE
        // ================================================================
        let currentUser = null;
        let currentSort = 'new';
        let currentRank = 'discuss';

        // ================================================================
        // DOM REFS
        // ================================================================
        const $ = (s, ctx = document) => ctx.querySelector(s);
        const $$ = (s, ctx = document) => [...ctx.querySelectorAll(s)];

        const toastEl = $('#toast');
        const userArea = $('#userArea');
        const navLinks = $('#navLinks');
        const postList = $('#postList');
        const feedTabs = $('#feedTabs');
        const rankTabs = $('#rankTabs');
        const rankList = $('#rankList');
        const authModal = $('#authModal');
        const authContent = $('#authContent');
        const authClose = $('#authClose');
        const profileBox = $('#profileBox');
        const btnPublish = $('#btnPublish');
        const pubTitle = $('#pubTitle');
        const pubContent = $('#pubContent');
        const pubPrice = $('#pubPrice');

        // ================================================================
        // TOAST
        // ================================================================
        let toastTimer = null;

        function showToast(msg, type = 'info') {
            if (toastTimer) { clearTimeout(toastTimer);
                toastEl.classList.remove('show'); }
            toastEl.textContent = msg;
            toastEl.className = 'toast ' + type;
            void toastEl.offsetWidth;
            toastEl.classList.add('show');
            toastTimer = setTimeout(() => {
                toastEl.classList.remove('show');
                toastTimer = null;
            }, 2800);
        }

        // ================================================================
        // AUTH
        // ================================================================
        function getCurrentUser() {
            if (currentUser) return currentUser;
            const saved = sessionStorage.getItem('quUser');
            if (saved) {
                try {
                    const uid = parseInt(saved, 10);
                    const user = data.users.find(u => u.id === uid);
                    if (user) { currentUser = user; return user; }
                } catch (_) {}
            }
            return null;
        }

        function setCurrentUser(user) {
            currentUser = user;
            if (user) {
                sessionStorage.setItem('quUser', String(user.id));
            } else {
                sessionStorage.removeItem('quUser');
            }
            renderNav();
            renderFeed();
            renderRank();
            renderProfile();
        }

        function requireAuth() {
            const user = getCurrentUser();
            if (!user) {
                showToast('请先登录', 'error');
                openAuthModal();
                return null;
            }
            return user;
        }

        // ================================================================
        // NAV
        // ================================================================
        function renderNav() {
            const user = getCurrentUser();
            if (user) {
                const avatarHtml = user.avatar ?
                    `<img src="${user.avatar}" alt="头像" />` :
                    `<span>${user.username.charAt(0).toUpperCase()}</span>`;
                userArea.innerHTML = `
                    <div class="avatar-sm">${avatarHtml}</div>
                    <span class="username">${user.username}</span>
                    <button class="btn-logout" id="btnLogout"><i class="fas fa-sign-out-alt"></i> 退出</button>
                `;
                const btnLogout = $('#btnLogout');
                if (btnLogout) {
                    btnLogout.addEventListener('click', () => {
                        setCurrentUser(null);
                        showToast('已退出', 'info');
                        closeAllModals();
                    });
                }
            } else {
                userArea.innerHTML = `
                    <button class="btn-login" id="btnLogin"><i class="fas fa-user-plus"></i> 登录 / 注册</button>
                `;
                const btnLogin = $('#btnLogin');
                if (btnLogin) {
                    btnLogin.addEventListener('click', openAuthModal);
                }
            }
        }

        // ================================================================
        // NAVIGATION
        // ================================================================
        function navigateTo(page) {
            $$('.page').forEach(el => el.classList.remove('active'));
            const target = $('#page-' + page);
            if (target) target.classList.add('active');

            $$('.nav-links a').forEach(a => {
                a.classList.toggle('active', a.dataset.page === page);
            });

            if (page === 'publish' || page === 'profile') {
                $('#sidebar').style.display = 'none';
            } else {
                $('#sidebar').style.display = '';
            }

            if (page === 'home') {
                renderFeed();
                renderRank();
            }
            if (page === 'profile') {
                renderProfile();
            }
        }

        $$('.nav-links a').forEach(a => {
            a.addEventListener('click', (e) => {
                e.preventDefault();
                navigateTo(a.dataset.page);
            });
        });

        // ================================================================
        // AUTH MODAL
        // ================================================================
        let authMode = 'login';

        function openAuthModal() {
            authModal.classList.add('open');
            renderAuthForm();
        }

        function closeAuthModal() {
            authModal.classList.remove('open');
        }

        function renderAuthForm() {
            const isLogin = authMode === 'login';
            authContent.innerHTML = `
                <div class="auth-title">${isLogin ? '登录' : '注册'}账号</div>
                <div class="auth-sub">${isLogin ? '欢迎回来！' : '加入趣社区，分享你的精彩'}</div>
                <form id="authForm">
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" id="authUsername" placeholder="请输入用户名" required />
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="authPassword" placeholder="请输入密码" required />
                    </div>
                    ${!isLogin ? `
                    <div class="form-group">
                        <label>确认密码</label>
                        <input type="password" id="authPassword2" placeholder="请再次输入密码" required />
                    </div>
                    ` : ''}
                    <button type="submit" class="btn-auth">${isLogin ? '登 录' : '注 册'}</button>
                </form>
                <div class="auth-switch">
                    ${isLogin ? '还没有账号？' : '已有账号？'}
                    <a id="authSwitch">${isLogin ? '去注册' : '去登录'}</a>
                </div>
            `;

            const form = $('#authForm');
            if (form) {
                form.addEventListener('submit', handleAuthSubmit);
            }
            const switchLink = $('#authSwitch');
            if (switchLink) {
                switchLink.addEventListener('click', () => {
                    authMode = authMode === 'login' ? 'register' : 'login';
                    renderAuthForm();
                });
            }
        }

        function handleAuthSubmit(e) {
            e.preventDefault();
            const username = $('#authUsername').value.trim();
            const password = $('#authPassword').value.trim();
            if (!username || !password) {
                showToast('请填写完整信息', 'error');
                return;
            }

            if (authMode === 'login') {
                const user = data.users.find(u => u.username === username && u.password === password);
                if (!user) {
                    showToast('用户名或密码错误', 'error');
                    return;
                }
                setCurrentUser(user);
                showToast('登录成功！', 'success');
                closeAuthModal();
                renderFeed();
                renderRank();
                renderProfile();
            } else {
                const password2 = $('#authPassword2').value.trim();
                if (password !== password2) {
                    showToast('两次密码输入不一致', 'error');
                    return;
                }
                if (data.users.find(u => u.username === username)) {
                    showToast('用户名已存在', 'error');
                    return;
                }
                const newUser = {
                    id: data.nextUserId++,
                    username,
                    password,
                    avatar: '',
                    joined: Date.now(),
                };
                data.users.push(newUser);
                saveData();
                setCurrentUser(newUser);
                showToast('注册成功！欢迎加入 🎉', 'success');
                closeAuthModal();
                renderFeed();
                renderRank();
                renderProfile();
            }
        }

        authClose.addEventListener('click', closeAuthModal);
        authModal.addEventListener('click', (e) => {
            if (e.target === authModal) closeAuthModal();
        });

        // ================================================================
        // FEED
        // ================================================================
        function renderFeed() {
            let posts = [...data.posts];
            if (currentSort === 'new') {
                posts.sort((a, b) => b.time - a.time);
            } else {
                posts.sort((a, b) => (b.likes.length + b.comments.length) - (a.likes.length + a.comments.length));
            }

            const user = getCurrentUser();
            if (posts.length === 0) {
                postList.innerHTML = `
                    <div style="text-align:center;padding:60px 0;color:#6b7280;">
                        <i class="fas fa-inbox" style="font-size:40px;display:block;margin-bottom:12px;"></i>
                        暂无帖子，快来发布第一条吧！
                    </div>
                `;
                return;
            }

            let html = '';
            posts.forEach(p => {
                const liked = user ? p.likes.includes(user.id) : false;
                const commentCount = p.comments ? p.comments.length : 0;
                const price = p.price || 0;
                html += `
                    <div class="post-card" data-id="${p.id}">
                        <div class="post-header">
                            <div class="avatar">${p.authorName.charAt(0).toUpperCase()}</div>
                            <div class="info">
                                <div class="name">${p.authorName}</div>
                                <div class="time">${formatTime(p.time)}</div>
                            </div>
                        </div>
                        <div class="post-title">${escapeHtml(p.title)}</div>
                        <div class="post-content">${escapeHtml(p.content)}</div>
                        <div class="post-meta">
                            <button class="action-btn like-btn ${liked ? 'liked' : ''}" data-id="${p.id}">
                                <i class="${liked ? 'fas' : 'far'} fa-heart"></i>
                                <span class="count">${p.likes.length}</span>
                            </button>
                            <button class="action-btn comment-btn" data-id="${p.id}">
                                <i class="far fa-comment"></i>
                                <span class="count">${commentCount}</span>
                            </button>
                            ${price > 0 ? `<span class="price-tag"><i class="fas fa-coins"></i> ¥${price.toFixed(2)}</span>` : ''}
                        </div>
                    </div>
                `;
            });
            postList.innerHTML = html;

            // 点赞
            $$('.like-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = parseInt(btn.dataset.id, 10);
                    if (id) toggleLike(id);
                });
            });

            // 点击卡片
            $$('.post-card').forEach(card => {
                card.addEventListener('click', () => {
                    const id = parseInt(card.dataset.id, 10);
                    if (id) showToast('📄 帖子 ID: ' + id, 'info');
                });
            });
        }

        feedTabs.addEventListener('click', (e) => {
            const btn = e.target.closest('button');
            if (!btn) return;
            $$('.feed-header .tabs button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentSort = btn.dataset.sort;
            renderFeed();
        });

        // ================================================================
        // RANK
        // ================================================================
        function renderRank() {
            let list = [...data.posts];
            if (currentRank === 'discuss') {
                list.sort((a, b) => (b.likes.length + b.comments.length) - (a.likes.length + a.comments.length));
            } else if (currentRank === 'likes') {
                list.sort((a, b) => b.likes.length - a.likes.length);
            } else {
                list.sort((a, b) => (b.price || 0) - (a.price || 0));
            }

            const top = list.slice(0, 10);
            if (top.length === 0) {
                rankList.innerHTML = `<div class="rank-empty">暂无数据</div>`;
                return;
            }

            let html = '';
            top.forEach((p, idx) => {
                const numClass = idx === 0 ? 'top1' : idx === 1 ? 'top2' : idx === 2 ? 'top3' : '';
                let value = '';
                if (currentRank === 'discuss') value = (p.likes.length + p.comments.length) + ' 互动';
                else if (currentRank === 'likes') value = p.likes.length + ' 赞';
                else value = '¥' + (p.price || 0).toFixed(2);

                html += `
                    <div class="rank-item" data-id="${p.id}">
                        <div class="rank-num ${numClass}">${idx + 1}</div>
                        <div class="rank-info">
                            <div class="r-title">${escapeHtml(p.title)}</div>
                            <div class="r-meta">${p.authorName} · ${formatTime(p.time)}</div>
                        </div>
                        <div class="rank-value">${value}</div>
                    </div>
                `;
            });
            rankList.innerHTML = html;

            $$('.rank-item').forEach(item => {
                item.addEventListener('click', () => {
                    const id = parseInt(item.dataset.id, 10);
                    if (id) showToast('📄 帖子 ID: ' + id, 'info');
                });
            });
        }

        rankTabs.addEventListener('click', (e) => {
            const btn = e.target.closest('button');
            if (!btn) return;
            $$('.rank-tabs button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentRank = btn.dataset.rank;
            renderRank();
        });

        // ================================================================
        // LIKE
        // ================================================================
        function toggleLike(postId) {
            const user = requireAuth();
            if (!user) return;
            const post = data.posts.find(p => p.id === postId);
            if (!post) return;

            const idx = post.likes.indexOf(user.id);
            if (idx > -1) {
                post.likes.splice(idx, 1);
                showToast('已取消点赞', 'info');
            } else {
                post.likes.push(user.id);
                showToast('点赞成功 ❤️', 'success');
            }
            saveData();
            renderFeed();
            renderRank();
        }

        // ================================================================
        // PUBLISH
        // ================================================================
        btnPublish.addEventListener('click', () => {
            const user = requireAuth();
            if (!user) return;

            const title = pubTitle.value.trim();
            const content = pubContent.value.trim();
            const price = parseFloat(pubPrice.value) || 0;

            if (!title) {
                showToast('请输入标题', 'error');
                pubTitle.focus();
                return;
            }
            if (!content) {
                showToast('请输入内容', 'error');
                pubContent.focus();
                return;
            }
            if (price < 0) {
                showToast('金额不能为负数', 'error');
                return;
            }

            const newPost = {
                id: data.nextPostId++,
                title,
                content,
                authorId: user.id,
                authorName: user.username,
                time: Date.now(),
                likes: [],
                comments: [],
                views: 0,
                shares: 0,
                price: price,
            };
            data.posts.unshift(newPost);
            saveData();

            pubTitle.value = '';
            pubContent.value = '';
            pubPrice.value = '0';

            showToast('发布成功！🎉', 'success');
            navigateTo('home');
            renderFeed();
            renderRank();
        });

        // ================================================================
        // PROFILE（完整版，包含头像功能）
        // ================================================================
        function renderProfile() {
            const user = getCurrentUser();

            if (!user) {
                profileBox.innerHTML = `
                    <div class="profile-empty">
                        <i class="fas fa-user-circle" style="font-size:48px;color:#6b7280;display:block;margin-bottom:12px;"></i>
                        请先登录查看个人中心
                        <br /><br />
                        <button class="btn-login" style="background:#4F7CFF;color:#fff;padding:10px 32px;border-radius:30px;font-weight:500;border:none;cursor:pointer;" onclick="openAuthModal()">
                            去登录
                        </button>
                    </div>
                `;
                return;
            }

            // ---- 头像显示 ----
            const avatarUrl = user.avatar || '';
            const avatarDisplay = avatarUrl ?
                `<img src="${avatarUrl}" alt="头像" />` :
                `<div class="big-avatar">${user.username.charAt(0).toUpperCase()}</div>`;

            // ---- 用户帖子 ----
            const userPosts = data.posts.filter(p => p.authorId === user.id);
            let postsHtml = '';
            if (userPosts.length === 0) {
                postsHtml = `<div class="profile-empty">你还没有发布过帖子</div>`;
            } else {
                userPosts.forEach(p => {
                    postsHtml += `
                        <div class="pp-item" data-id="${p.id}">
                            <div class="pp-title-text">${escapeHtml(p.title)}</div>
                            <div class="pp-meta">${formatTime(p.time)} · ${p.likes.length} 赞 · ${p.comments ? p.comments.length : 0} 评论</div>
                        </div>
                    `;
                });
            }

            // ---- 渲染 HTML ---- 
            profileBox.innerHTML = `
                <div class="profile-head">
                    <!-- 头像区域 -->
                    <div class="avatar-wrapper" id="avatarWrapper">
                        ${avatarDisplay}
                        <div class="avatar-overlay" id="avatarOverlay">
                            <i class="fas fa-camera"></i>
                            <span>更换头像</span>
                        </div>
                        <input type="file" id="avatarInput" accept="image/*" style="display:none;" />
                    </div>
                    <div class="p-info">
                        <div class="p-name">${user.username}</div>
                        <div class="p-joined">加入于 ${formatTime(user.joined)}</div>
                        <button class="btn-change-avatar" id="changeAvatarBtn">
                            <i class="fas fa-camera"></i> 更换头像
                        </button>
                    </div>
                </div>
                <div class="profile-posts">
                    <div class="pp-title">我的帖子 (${userPosts.length})</div>
                    ${postsHtml}
                </div>
            `;

            // ---- 绑定头像事件 ----
            const avatarWrapper = document.getElementById('avatarWrapper');
            const avatarOverlay = document.getElementById('avatarOverlay');
            const changeAvatarBtn = document.getElementById('changeAvatarBtn');
            const avatarInput = document.getElementById('avatarInput');

            // 确保遮罩默认隐藏
            if (avatarOverlay) {
                avatarOverlay.style.display = 'none';
            }

            // 点击头像触发文件选择
            if (avatarWrapper && avatarInput) {
                avatarWrapper.addEventListener('click', function(e) {
                    if (e.target.closest('.btn-change-avatar')) return;
                    avatarInput.click();
                });
            }

            // 点击按钮触发文件选择
            if (changeAvatarBtn && avatarInput) {
                changeAvatarBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    avatarInput.click();
                });
            }

            // 文件上传处理
            if (avatarInput) {
                avatarInput.addEventListener('change', function(e) {
                    const file = this.files[0];
                    if (!file) return;

                    if (file.size > 2 * 1024 * 1024) {
                        showToast('图片大小不能超过 2MB', 'error');
                        this.value = '';
                        return;
                    }

                    if (!['image/jpeg', 'image/png', 'image/gif', 'image/webp'].includes(file.type)) {
                        showToast('仅支持 JPG、PNG、GIF、WEBP 格式', 'error');
                        this.value = '';
                        return;
                    }

                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const currentUser = getCurrentUser();
                        if (currentUser) {
                            currentUser.avatar = e.target.result;
                            saveData();
                            renderProfile();
                            renderNav();
                            showToast('头像更新成功！ 🎉', 'success');
                        }
                    };
                    reader.onerror = function() {
                        showToast('读取图片失败，请重试', 'error');
                    };
                    reader.readAsDataURL(file);
                });
            }

            // 帖子点击事件
            $$('.pp-item').forEach(item => {
                item.addEventListener('click', function() {
                    const id = parseInt(this.dataset.id, 10);
                    if (id) showToast('📄 帖子 ID: ' + id, 'info');
                });
            });

            console.log('✅ 头像功能已渲染！鼠标悬停到头像上即可看到相机图标');
        }

        // ================================================================
        // UTILITY
        // ================================================================
        function formatTime(ts) {
            if (!ts) return '刚刚';
            const diff = Date.now() - ts;
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return Math.floor(diff / 60000) + ' 分钟前';
            if (diff < 86400000) return Math.floor(diff / 3600000) + ' 小时前';
            if (diff < 172800000) return '昨天';
            if (diff < 259200000) return '前天';
            const d = new Date(ts);
            const pad = n => String(n).padStart(2, '0');
            return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) + ' ' +
                pad(d.getHours()) + ':' + pad(d.getMinutes());
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function closeAllModals() {
            authModal.classList.remove('open');
        }

        // ================================================================
        // INIT
        // ================================================================
        function init() {
            const user = getCurrentUser();
            if (user) currentUser = user;
            renderNav();
            renderFeed();
            renderRank();
            renderProfile();
            console.log('🌟 趣社区已启动！');
            console.log('💡 提示：登录后进入「我的」页面，鼠标悬停到头像上即可看到相机图标');
        }

        // 暴露给全局
        window.openAuthModal = openAuthModal;
        window.renderProfile = renderProfile;

        init();

        // 监听 storage 变化
        window.addEventListener('storage', (e) => {
            if (e.key === STORAGE_KEY) {
                data = loadData();
                renderFeed();
                renderRank();
                renderProfile();
            }
        });
    </script>

</body>
</html>
