<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>趣社区 - 自由分享交流</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div id="toast" class="toast"></div>

    <!-- ===== 导航栏 ===== -->
    <nav class="navbar" id="navbar">
        <div class="logo"><i class="fas fa-comment-dots"></i> 趣社区</div>
        <button class="nav-toggle" id="navToggle"><i class="fas fa-bars"></i></button>
        <div class="nav-links" id="navLinks">
            <a href="#" class="active" data-page="home"><i class="fas fa-home"></i> 首页</a>
            <a href="#" data-page="publish"><i class="fas fa-pen"></i> 发布</a>
            <a href="#" data-page="profile"><i class="fas fa-user"></i> 我的</a>
        </div>
        <div class="user-area" id="userArea"></div>
    </nav>

    <!-- ===== 主容器 ===== -->
    <div class="container">
        <!-- 左侧主内容 -->
        <div>
            <!-- 首页 -->
            <div class="page active" id="page-home">
                <!-- 顶部冠军展示 -->
                <div class="champions" id="champions">
                    <!-- 由 JS 渲染 -->
                </div>
                <div class="feed-header">
                    <h2><i class="fas fa-rss" style="color:#4F7CFF;margin-right:8px;"></i>最新动态</h2>
                    <div class="tabs" id="feedTabs">
                        <button class="active" data-sort="new">最新</button>
                        <button data-sort="hot">热门</button>
                    </div>
                </div>
                <div id="postList"></div>
            </div>

            <!-- 发布页 -->
            <div class="page" id="page-publish">
                <div class="page-title"><i class="fas fa-feather-alt" style="color:#4F7CFF;margin-right:10px;"></i>发布帖子</div>
                <div class="publish-box">
                    <div class="form-group">
                        <label>标题 <span style="color:#ef4444;">*</span></label>
                        <input type="text" id="pubTitle" placeholder="输入标题..." maxlength="80" />
                    </div>
                    <div class="form-group">
                        <label>内容 <span style="color:#ef4444;">*</span></label>
                        <textarea id="pubContent" placeholder="分享你的想法..." maxlength="5000"></textarea>
                    </div>
                    <!-- 图片上传 -->
                    <div class="form-group">
                        <label>图片（最多 8 张）</label>
                        <div class="file-upload-area">
                            <input type="file" id="pubImages" accept="image/*" multiple style="display:none;" />
                            <button type="button" class="btn-upload" id="btnUploadImages"><i class="fas fa-image"></i> 选择图片</button>
                            <span class="file-count" id="imageCount">已选 0 张</span>
                        </div>
                        <div class="preview-grid" id="imagePreview"></div>
                    </div>
                    <!-- 视频上传 -->
                    <div class="form-group">
                        <label>视频（最多 1 个）</label>
                        <div class="file-upload-area">
                            <input type="file" id="pubVideo" accept="video/*" style="display:none;" />
                            <button type="button" class="btn-upload" id="btnUploadVideo"><i class="fas fa-video"></i> 选择视频</button>
                            <span class="file-count" id="videoCount">未选择</span>
                        </div>
                        <div class="preview-grid" id="videoPreview"></div>
                    </div>
                    <div class="form-group">
                        <label>付费金额 (元) <span style="color:#6b7280;font-weight:400;font-size:13px;">— 设为0则免费</span></label>
                        <input type="number" id="pubPrice" placeholder="0" min="0" step="0.01" value="0" />
                    </div>
                    <button class="btn-publish" id="btnPublish"><i class="fas fa-paper-plane" style="margin-right:8px;"></i>发布</button>
                </div>
            </div>

            <!-- 个人中心 -->
            <div class="page" id="page-profile">
                <div class="page-title"><i class="fas fa-user-circle" style="color:#4F7CFF;margin-right:10px;"></i>个人中心</div>
                <div class="profile-box" id="profileBox"></div>
            </div>
        </div>

        <!-- 右侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="rank-card">
                <h3><i class="fas fa-trophy" style="color:#f59e0b;"></i> 排行榜</h3>
                <div class="rank-tabs" id="rankTabs">
                    <button class="active" data-rank="discuss">讨论度</button>
                    <button data-rank="likes">点赞量</button>
                    <button data-rank="price">付费最高</button>
                </div>
                <div class="rank-list" id="rankList"></div>
            </div>
        </aside>
    </div>

    <!-- ===== 登录模态框 ===== -->
    <div class="modal-overlay" id="authModal">
        <div class="modal-content">
            <button class="modal-close" id="authClose"><i class="fas fa-times"></i></button>
            <div id="authContent"></div>
        </div>
    </div>

    <!-- ===== 帖子详情模态框 ===== -->
    <div class="modal-overlay" id="detailModal">
        <div class="modal-content detail-content">
            <button class="modal-close" id="detailClose"><i class="fas fa-times"></i></button>
            <div id="detailContent"></div>
        </div>
    </div>

    <!-- ===== 分享模态框 ===== -->
    <div class="modal-overlay share-modal" id="shareModal">
        <div class="modal-content">
            <button class="modal-close" id="shareClose"><i class="fas fa-times"></i></button>
            <div class="share-icon"><i class="fas fa-share-alt"></i></div>
            <div class="share-title">分享这篇帖子</div>
            <div class="share-desc">复制链接分享给朋友</div>
            <div class="share-link-box">
                <input type="text" id="shareLinkInput" readonly />
                <button id="shareCopyBtn"><i class="fas fa-copy"></i> 复制</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
