<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>趣社区 - 自由分享交流</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        /* ===== CSS 变量 & 重置 ===== */
        :root {
            --primary: #4F7CFF;
            --primary-dark: #3a5fd9;
            --primary-light: #e8eeff;
            --secondary: #6C5CE7;
            --bg: #F0F2F5;
            --card-bg: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #6b7280;
            --border: #e5e7eb;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            --radius: 16px;
            --radius-sm: 10px;
            --nav-height: 64px;
            --max-width: 1200px;
            --transition: 0.25s ease;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding-top: var(--nav-height);
            line-height: 1.6;
        }
        a {
            text-decoration: none;
            color: inherit;
        }
        button {
            cursor: pointer;
            border: none;
            outline: none;
            font-family: inherit;
            font-size: inherit;
            background: none;
        }
        input,
        textarea {
            font-family: inherit;
            font-size: inherit;
            outline: none;
            border: none;
        }
        img {
            display: block;
            max-width: 100%;
        }
        .hidden {
            display: none !important;
        }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2937;
            color: #fff;
            padding: 12px 28px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.35s ease;
            pointer-events: none;
            max-width: 90vw;
            text-align: center;
        }
        .toast.show {
            opacity: 1;
        }
        .toast.success {
            background: #065f46;
        }
        .toast.error {
            background: #991b1b;
        }
        .toast.info {
            background: #1e40af;
        }

        /* ===== 导航栏 ===== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--nav-height);
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 1000;
        }
        .navbar .logo {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .navbar .logo i {
            -webkit-text-fill-color: var(--primary);
        }
        .navbar .nav-links {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .navbar .nav-links a {
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-secondary);
            transition: var(--transition);
            text-decoration: none;
            cursor: pointer;
        }
        .navbar .nav-links a:hover {
            background: var(--primary-light);
            color: var(--primary);
        }
        .navbar .nav-links a.active {
            background: var(--primary);
            color: #fff;
        }
        .navbar .user-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .navbar .user-area .avatar-sm {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--primary-light);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 15px;
            flex-shrink: 0;
            overflow: hidden;
        }
        .navbar .user-area .avatar-sm img {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            object-fit: cover;
        }
        .navbar .user-area .username {
            font-weight: 500;
            font-size: 14px;
            color: var(--text);
        }
        .navbar .user-area .btn-login {
            background: var(--primary);
            color: #fff;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 500;
            transition: var(--transition);
        }
        .navbar .user-area .btn-login:hover {
            background: var(--primary-dark);
        }
        .navbar .user-area .btn-logout {
            color: var(--text-secondary);
            padding: 6px 12px;
            border-radius: 30px;
            transition: var(--transition);
        }
        .navbar .user-area .btn-logout:hover {
            background: #fee2e2;
            color: #dc2626;
        }
        .nav-toggle {
            display: none;
            font-size: 24px;
            color: var(--text);
            padding: 4px 8px;
        }
        @media (max-width: 820px) {
            .nav-toggle {
                display: block;
            }
            .navbar .nav-links {
                position: absolute;
                top: var(--nav-height);
                left: 0;
                right: 0;
                background: var(--card-bg);
                flex-direction: column;
                padding: 16px 24px;
                gap: 4px;
                border-bottom: 1px solid var(--border);
                box-shadow: var(--shadow);
                display: none;
            }
            .navbar .nav-links.open {
                display: flex;
            }
            .navbar .nav-links a {
                width: 100%;
                padding: 12px 16px;
                justify-content: center;
            }
            .navbar .user-area .username {
                display: none;
            }
        }

        /* ===== 容器 ===== */
        .container {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 24px 20px;
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 28px;
        }
        @media (max-width: 960px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        /* ===== 页面切换 ===== */
        .page {
            display: none;
            animation: fadeUp 0.3s ease;
        }
        .page.active {
            display: block;
        }
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .page-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        /* ===== 冠军展示 ===== */
        .champions {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        @media (max-width: 600px) {
            .champions {
                grid-template-columns: 1fr;
            }
        }
        .champion-item {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 16px 20px;
            box-shadow: var(--shadow);
            border-left: 4px solid var(--primary);
            cursor: pointer;
            transition: var(--transition);
        }
        .champion-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        }
        .champion-item .champ-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .champion-item .champ-title {
            font-weight: 600;
            font-size: 15px;
            margin: 4px 0 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .champion-item .champ-meta {
            font-size: 13px;
            color: var(--text-secondary);
        }
        .champion-item .champ-badge {
            display: inline-block;
            background: #fef3c7;
            color: #d97706;
            font-size: 12px;
            font-weight: 700;
            padding: 2px 10px;
            border-radius: 20px;
            margin-top: 4px;
        }

        /* ===== 帖子列表 ===== */
        .feed-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .feed-header h2 {
            font-size: 22px;
            font-weight: 700;
        }
        .feed-header .tabs {
            display: flex;
            gap: 4px;
            background: var(--bg);
            padding: 4px;
            border-radius: 30px;
        }
        .feed-header .tabs button {
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            transition: var(--transition);
            background: none;
            border: none;
            cursor: pointer;
        }
        .feed-header .tabs button.active {
            background: var(--card-bg);
            color: var(--text);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
        }

        /* ===== 帖子卡片 ===== */
        .post-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 20px 24px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
            transition: var(--transition);
            border: 1px solid transparent;
            cursor: pointer;
        }
        .post-card:hover {
            border-color: var(--border);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
        }
        .post-card .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }
        .post-card .post-header .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary-light);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 16px;
            flex-shrink: 0;
            overflow: hidden;
        }
        .post-card .post-header .avatar img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }
        .post-card .post-header .info .name {
            font-weight: 600;
            font-size: 15px;
        }
        .post-card .post-header .info .time {
            font-size: 13px;
            color: var(--text-secondary);
        }
        .post-card .post-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 6px;
            line-height: 1.4;
        }
        .post-card .post-content {
            color: var(--text-secondary);
            font-size: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.7;
        }
        .post-card .post-media {
            margin-top: 12px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 8px;
        }
        .post-card .post-media img {
            border-radius: var(--radius-sm);
            width: 100%;
            height: 120px;
            object-fit: cover;
            background: var(--bg);
        }
        .post-card .post-media video {
            border-radius: var(--radius-sm);
            width: 100%;
            max-height: 300px;
            background: #000;
        }
        .post-card .post-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid var(--border);
            flex-wrap: wrap;
        }
        .post-card .post-meta .action-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: var(--text-secondary);
            padding: 4px 10px;
            border-radius: 30px;
            transition: var(--transition);
            background: transparent;
            border: none;
            cursor: pointer;
        }
        .post-card .post-meta .action-btn:hover {
            background: var(--primary-light);
            color: var(--primary);
        }
        .post-card .post-meta .action-btn.liked {
            color: var(--primary);
        }
        .post-card .post-meta .action-btn.liked i {
            font-weight: 900;
        }
        .post-card .post-meta .action-btn .count {
            font-weight: 500;
        }
        .post-card .post-meta .price-tag {
            margin-left: auto;
            background: #fef3c7;
            color: #d97706;
            padding: 2px 14px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
        }
        .post-card .post-meta .hot-badge {
            background: #fee2e2;
            color: #dc2626;
            padding: 2px 12px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
        }
        .post-card .post-meta .rank-badge {
            background: #fef3c7;
            color: #d97706;
            padding: 2px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
        }

        /* ===== 发布页面 ===== */
        .publish-box {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 28px 32px;
            box-shadow: var(--shadow);
            max-width: 720px;
        }
        .publish-box .form-group {
            margin-bottom: 18px;
        }
        .publish-box .form-group label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 6px;
        }
        .publish-box .form-group input,
        .publish-box .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg);
            transition: var(--transition);
            font-size: 15px;
        }
        .publish-box .form-group input:focus,
        .publish-box .form-group textarea:focus {
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(79, 124, 255, 0.12);
        }
        .publish-box .form-group textarea {
            min-height: 140px;
            resize: vertical;
        }
        .file-upload-area {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .btn-upload {
            padding: 8px 20px;
            background: var(--primary-light);
            color: var(--primary);
            border-radius: 30px;
            font-weight: 500;
            transition: var(--transition);
            border: none;
            cursor: pointer;
        }
        .btn-upload:hover {
            background: var(--primary);
            color: #fff;
        }
        .file-count {
            font-size: 14px;
            color: var(--text-secondary);
        }
        .preview-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        .preview-grid .preview-item {
            position: relative;
            width: 80px;
            height: 80px;
            border-radius: var(--radius-sm);
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .preview-grid .preview-item img,
        .preview-grid .preview-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .preview-grid .preview-item .remove-btn {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            border: none;
        }
        .preview-grid .preview-item .remove-btn:hover {
            background: #dc2626;
        }
        .btn-publish {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            padding: 12px 40px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 16px;
            transition: var(--transition);
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(79, 124, 255, 0.35);
        }
        .btn-publish:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(79, 124, 255, 0.45);
        }

        /* ===== 排行榜 ===== */
        .sidebar {
            position: sticky;
            top: calc(var(--nav-height) + 24px);
            align-self: start;
        }
        .rank-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
        }
        .rank-card h3 {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .rank-tabs {
            display: flex;
            gap: 4px;
            background: var(--bg);
            padding: 4px;
            border-radius: 30px;
            margin-bottom: 16px;
        }
        .rank-tabs button {
            flex: 1;
            padding: 6px 0;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            transition: var(--transition);
            text-align: center;
            background: none;
            border: none;
            cursor: pointer;
        }
        .rank-tabs button.active {
            background: var(--card-bg);
            color: var(--text);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
        }
        .rank-list .rank-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: var(--transition);
        }
        .rank-list .rank-item:hover {
            background: var(--primary-light);
            margin: 0 -8px;
            padding-left: 8px;
            padding-right: 8px;
            border-radius: var(--radius-sm);
        }
        .rank-list .rank-item .rank-num {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-secondary);
            flex-shrink: 0;
        }
        .rank-list .rank-item .rank-num.top1 {
            background: #fef3c7;
            color: #d97706;
        }
        .rank-list .rank-item .rank-num.top2 {
            background: #e5e7eb;
            color: #6b7280;
        }
        .rank-list .rank-item .rank-num.top3 {
            background: #fde68a;
            color: #b45309;
        }
        .rank-list .rank-item .rank-info {
            flex: 1;
            min-width: 0;
        }
        .rank-list .rank-item .rank-info .r-title {
            font-weight: 500;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .rank-list .rank-item .rank-info .r-meta {
            font-size: 12px;
            color: var(--text-secondary);
        }
        .rank-list .rank-item .rank-value {
            font-weight: 600;
            font-size: 14px;
            color: var(--primary);
            flex-shrink: 0;
        }
        .rank-empty {
            text-align: center;
            color: var(--text-secondary);
            padding: 20px 0;
            font-size: 14px;
        }

        /* ===== 个人中心 ===== */
        .profile-box {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 28px 32px;
            box-shadow: var(--shadow);
            max-width: 720px;
        }
        .profile-head {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .profile-head .p-info {
            flex: 1;
        }
        .profile-head .p-info .p-name {
            font-size: 20px;
            font-weight: 700;
        }
        .profile-head .p-info .p-joined {
            font-size: 14px;
            color: var(--text-secondary);
        }
        .avatar-wrapper {
            position: relative;
            cursor: pointer;
            width: 72px;
            height: 72px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
        }
        .avatar-wrapper .big-avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: var(--primary-light);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: 700;
        }
        .avatar-wrapper img {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
        }
        .avatar-overlay {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.55);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: #fff;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }
        .avatar-overlay i {
            font-size: 24px;
            margin-bottom: 2px;
        }
        .avatar-overlay span {
            font-size: 12px;
            opacity: 0.9;
        }
        .avatar-wrapper:hover .avatar-overlay {
            display: flex !important;
        }
        .btn-change-avatar {
            margin-top: 6px;
            padding: 4px 16px;
            background: var(--primary-light);
            color: var(--primary);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-change-avatar:hover {
            background: var(--primary);
            color: #fff;
        }
        .profile-posts .pp-title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 12px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }
        .profile-posts .pp-item {
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: var(--transition);
        }
        .profile-posts .pp-item:hover {
            background: var(--primary-light);
            margin: 0 -12px;
            padding-left: 12px;
            padding-right: 12px;
            border-radius: var(--radius-sm);
        }
        .profile-posts .pp-item .pp-title-text {
            font-weight: 500;
        }
        .profile-posts .pp-item .pp-meta {
            font-size: 13px;
            color: var(--text-secondary);
        }
        .profile-empty {
            color: var(--text-secondary);
            text-align: center;
            padding: 30px 0;
        }

        /* ===== 模态框 ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;

                    const def = getDefaultData();
                    for (const k in def) {
                        if (!(k in parsed)) parsed[k] = def[k];
                    }
                    return parsed;
                }

            return getDefaultData();

            if (toastTimer) { clearTimeout(toastTimer);
                toastEl.classList.remove('show'); }
            toastEl.textContent = msg;
            toastEl.className = 'toast ' + type;
            void toastEl.offsetWidth;
            toastEl.classList.add('show');
            toastTimer = setTimeout(() => {
                toastEl.classList.remove('show');
                toastTimer = null;
            }, 2800);
        }

        function getCurrentUser() {
            if (currentUser) return currentUser;
            const saved = sessionStorage.getItem('quUser');

                try {
                    const uid = parseInt(saved, 10);
                    const user = data.users.find(u => u.id === uid);
                    if (user) { currentUser = user; return user; }
                } catch (_) {}
            }
            return null;
        }

            currentUser = user;

            renderFeed();
            renderRank();
            renderProfile();
            renderChampions();
        }

        function requireAuth() {
            const user = getCurrentUser();
            if (!user) {
                showToast('请先登录', 'error');
                openAuthModal();
                return null;
            }
            return user;
        }

        // ================================================================
        // NAV
        // ================================================================
        function renderNav() {
            const user = getCurrentUser();
            if (user) {
                const avatarHtml = user.avatar ?
                    `<img src="${user.avatar}" alt="头像" />` :
                    `<span>${user.username.charAt(0).toUpperCase()}</span>`;

                    <div class="avatar-sm">${avatarHtml}</div>

                    });

                userArea.innerHTML = `
                    <button class="btn-login" id="btnLogin"><i class="fas fa-user-plus"></i> 登录 / 注册</button>

        // ================================================================
        // NAVIGATION
        // ================================================================
        function navigateTo(page) {
            $$('.page').forEach(el => el.classList.remove('active'));
            const target = $('#page-' + page);
            if (target) target.classList.add('active');

            $$('.nav-links a').forEach(a => {
                a.classList.toggle('active', a.dataset.page === page);
            });

            if (page === 'publish' || page === 'profile') {
                $('#sidebar').style.display = 'none';
            } else {
                $('#sidebar').style.display = '';
            }

            if (page === 'home') {
                renderFeed();
                renderRank();
                renderChampions();
            }
            if (page === 'profile') {
                renderProfile();
            }
        }

        $$('.nav-links a').forEach(a => {
            a.addEventListener('click', (e) => {
                e.preventDefault();
                navigateTo(a.dataset.page);
            });
        });

        navToggle.addEventListener('click', () => {
            navLinks.classList.toggle('open');
        });

        // ================================================================
        // AUTH MODAL
        // ================================================================
        let authMode = 'login';

        function openAuthModal() {
            authModal.classList.add('open');
            renderAuthForm();
        }

        function closeAuthModal() {
            authModal.classList.remove('open');
        }

        function renderAuthForm() {
            const isLogin = authMode === 'login';
            authContent.innerHTML = `
                <div class="auth-title">${isLogin ? '登录' : '注册'}账号</div>
                <div class="auth-sub">${isLogin ? '欢迎回来！' : '加入趣社区，分享你的精彩'}</div>
                <form id="authForm">
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" id="authUsername" placeholder="请输入用户名" required />
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="authPassword" placeholder="请输入密码" required />
                    </div>
                    ${!isLogin ? `
                    <div class="form-group">
                        <label>确认密码</label>
                        <input type="password" id="authPassword2" placeholder="请再次输入密码" required />
                    </div>
                    ` : ''}
                    <button type="submit" class="btn-auth">${isLogin ? '登 录' : '注 册'}</button>
                </form>
                <div class="auth-switch">
                    ${isLogin ? '还没有账号？' : '已有账号？'}
                    <a id="authSwitch">${isLogin ? '去注册' : '去登录'}</a>
                </div>
            `;

            const form = $('#authForm');
            if (form) {
                form.addEventListener('submit', handleAuthSubmit);
            }
            const switchLink = $('#authSwitch');
            if (switchLink) {
                switchLink.addEventListener('click', () => {
                    authMode = authMode === 'login' ? 'register' : 'login';
                    renderAuthForm();
                });
            }
        }

        function handleAuthSubmit(e) {
            e.preventDefault();
            const username = $('#authUsername').value.trim();
            const password = $('#authPassword').value.trim();
            if (!username || !password) {
                showToast('请填写完整信息', 'error');
                return;
            }

            if (authMode === 'login') {
                const user = data.users.find(u => u.username === username && u.password === password);
                if (!user) {
                    showToast('用户名或密码错误', 'error');
                    return;
                }
                setCurrentUser(user);
                showToast('登录成功！', 'success');
                closeAuthModal();
                renderFeed();
                renderRank();
                renderProfile();
                renderChampions();
            } else {
                const password2 = $('#authPassword2').value.trim();
                if (password !== password2) {
                    showToast('两次密码输入不一致', 'error');
                    return;
                }
                if (data.users.find(u => u.username === username)) {
                    showToast('用户名已存在', 'error');
                    return;
                }
                const newUser = {
                    id: data.nextUserId++,
                    username,
                    password,
                    avatar: '',
                    joined: Date.now(),
                };
                data.users.push(newUser);
                saveData();
                setCurrentUser(newUser);
                showToast('注册成功！欢迎加入 🎉', 'success');
                closeAuthModal();
                renderFeed();
                renderRank();
                renderProfile();
                renderChampions();
            }
        }

        authClose.addEventListener('click', closeAuthModal);
        authModal.addEventListener('click', (e) => {
            if (e.target === authModal) closeAuthModal();
        });

        // ================================================================
        // CHAMPIONS
        // ================================================================
        function renderChampions() {
            const posts = data.posts;
            if (posts.length === 0) {
                champions.innerHTML = '';
                return;
            }

            const discussSorted = [...posts].sort((a, b) =>
                (b.likes.length + b.comments.length) - (a.likes.length + a.comments.length)
            );
            const discussChamp = discussSorted[0];

            const likesSorted = [...posts].sort((a, b) => b.likes.length - a.likes.length);
            const likesChamp = likesSorted[0];

            const priceSorted = [...posts].sort((a, b) => (b.price || 0) - (a.price || 0));
            const priceChamp = priceSorted[0];

            const champs = [
                { label: '🔥 讨论度 No.1', post: discussChamp, key: 'discuss' },
                { label: '❤️ 点赞量 No.1', post: likesChamp, key: 'likes' },
                { label: '💰 付费最高 No.1', post: priceChamp, key: 'price' },
            ];

            let html = '';
            champs.forEach(({ label, post, key }) => {
                if (!post) return;
                const rankText = key === 'discuss' ? `互动 ${post.likes.length + post.comments.length}` :
                    key === 'likes' ? `点赞 ${post.likes.length}` :
                    `¥${(post.price || 0).toFixed(2)}`;
                html += `
                    <div class="champion-item" onclick="openDetail(${post.id})">
                        <div class="champ-label">${label}</div>
                        <div class="champ-title">${escapeHtml(post.title)}</div>
                        <div class="champ-meta">${post.authorName} · ${formatTime(post.time)}</div>
                        <div class="champ-badge">${rankText}</div>
                    </div>
                `;
            });

            champions.innerHTML = html;
        }

        // ================================================================
        // FEED
        // ================================================================
        function renderFeed() {
            let posts = [...data.posts];
            if (currentSort === 'new') {
                posts.sort((a, b) => b.time - a.time);
            } else {
                posts.sort((a, b) => (b.likes.length + b.comments.length) - (a.likes.length + a.comments.length));
            }

            const user = getCurrentUser();
            if (posts.length === 0) {
                postList.innerHTML = `
                    <div style="text-align:center;padding:60px 0;color:var(--text-secondary);">
                        <i class="fas fa-inbox" style="font-size:40px;display:block;margin-bottom:12px;"></i>
                        暂无帖子，快来发布第一条吧！
                    </div>
                `;
                return;
            }

            const rankInfo = getRankInfo();

            let html = '';
            posts.forEach(p => {
                const liked = user ? p.likes.includes(user.id) : false;
                const commentCount = p.comments ? p.comments.length : 0;
                const price = p.price || 0;

                let hotBadge = '';
                if (p.likes.length + commentCount > 20) {
                    hotBadge = `<span class="hot-badge">🔥 热门</span>`;
                }

                let rankBadge = '';
                if (rankInfo[p.id]) {
                    rankBadge = `<span class="rank-badge">🏆 ${rankInfo[p.id]}</span>`;
                }

                const authorUser = data.users.find(u => u.id === p.authorId);
                const authorAvatar = authorUser && authorUser.avatar ? authorUser.avatar : '';

                let mediaHtml = '';
                if (p.images && p.images.length > 0) {
                    mediaHtml += `<div class="post-media">`;
                    p.images.forEach(img => {
                        mediaHtml += `<img src="${img}" alt="图片" />`;
                    });
                    mediaHtml += `</div>`;
                }
                if (p.video) {
                    mediaHtml += `<div class="post-media"><video src="${p.video}" controls></video></div>`;
                }

                html += `
                    <div class="post-card" data-id="${p.id}">
                        <div class="post-header">
                            <div class="avatar">${authorAvatar ? `<img src="${authorAvatar}" />` : p.authorName.charAt(0).toUpperCase()}</div>
                            <div class="info">
                                <div class="name">${p.authorName}</div>
                                <div class="time">${formatTime(p.time)}</div>
                            </div>
                        </div>
                        <div class="post-title">${escapeHtml(p.title)}</div>
                        <div class="post-content">${escapeHtml(p.content)}</div>
                        ${mediaHtml}
                        <div class="post-meta">
                            <button class="action-btn like-btn ${liked ? 'liked' : ''}" data-id="${p.id}">
                                <i class="${liked ? 'fas' : 'far'} fa-heart"></i>
                                <span class="count">${p.likes.length}</span>
                            </button>
                            <button class="action-btn comment-btn" data-id="${p.id}">
                                <i class="far fa-comment"></i>
                                <span class="count">${commentCount}</span>
                            </button>
                            <button class="action-btn share-btn" data-id="${p.id}">
                                <i class="fas fa-share-alt"></i>
                                <span class="count">${p.shares || 0}</span>
                            </button>
                            ${price > 0 ? `<span class="price-tag"><i class="fas fa-coins"></i> ¥${price.toFixed(2)}</span>` : ''}
                            ${hotBadge}
                            ${rankBadge}
                        </div>
                    </div>

            postList.innerHTML = html;

            $$('.like-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = parseInt(btn.dataset.id, 10);
                    if (id) toggleLike(id);
                });
            });

            $$('.comment-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = parseInt(btn.dataset.id, 10);
                    if (id) openDetail(id);
                });
            });

            $$('.share-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = parseInt(btn.dataset.id, 10);
                    if (id) openShare(id);
                });
            });

            $$('.post-card').forEach(card => {
                card.addEventListener('click', () => {
                    const id = parseInt(card.dataset.id, 10);
                    if (id) openDetail(id);
                });

        feedTabs.addEventListener('click', (e) => {
            const btn = e.target.closest('button');
            if (!btn) return;
            $$('.feed-header .tabs button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentSort = btn.dataset.sort;
            renderFeed();
        });

        // ================================================================
        // RANK INFO
        // ================================================================
        function getRankInfo() {
            const posts = data.posts;
            const result = {};

            const discussSorted = [...posts].sort((a, b) =>
                (b.likes.length + b.comments.length) - (a.likes.length + a.comments.length)
            );
            discussSorted.forEach((p, idx) => {
                if (idx < 10) {
                    if (!result[p.id]) result[p.id] = [];
                    result[p.id].push(`讨论度 No.${idx + 1}`);
                }
            });

            const likesSorted = [...posts].sort((a, b) => b.likes.length - a.likes.length);
            likesSorted.forEach((p, idx) => {
                if (idx < 10) {
                    if (!result[p.id]) result[p.id] = [];
                    result[p.id].push(`点赞 No.${idx + 1}`);
                }
            });

            const priceSorted = [...posts].sort((a, b) => (b.price || 0) - (a.price || 0));
            priceSorted.forEach((p, idx) => {
                if (idx < 10 && (p.price || 0) > 0) {
                    if (!result[p.id]) result[p.id] = [];
                    result[p.id].push(`付费 No.${idx + 1}`);
                }
            });

            for (const key in result) {
                result[key] = result[key].join(' · ');
            }

            return result;
        }

        // ================================================================
        // RANK
        // ================================================================
        function renderRank() {
            let list = [...data.posts];
            if (currentRank === 'discuss') {
                list.sort((a, b) => (b.likes.length + b.comments.length) - (a.likes.length + a.comments.length));
            } else if (currentRank === 'likes') {
                list.sort((a, b) => b.likes.length - a.likes.length);
            } else {
                list.sort((a, b) => (b.price || 0) - (a.price || 0));
            }

            const top = list.slice(0, 10);
            if (top.length === 0) {
                rankList.innerHTML = `<div class="rank-empty">暂无数据</div>`;
                return;
            }

            let html = '';
            top.forEach((p, idx) => {
                const numClass = idx === 0 ? 'top1' : idx === 1 ? 'top2' : idx === 2 ? 'top3' : '';
                let value = '';
                if (currentRank === 'discuss') value = (p.likes.length + p.comments.length) + ' 互动';
                else if (currentRank === 'likes') value = p.likes.length + ' 赞';
                else value = '¥' + (p.price || 0).toFixed(2);

                html += `
                    <div class="rank-item" data-id="${p.id}">
                        <div class="rank-num ${numClass}">${idx + 1}</div>
                        <div class="rank-info">
                            <div class="r-title">${escapeHtml(p.title)}</div>
                            <div class="r-meta">${p.authorName} · ${formatTime(p.time)}</div>
                        </div>
                        <div class="rank-value">${value}</div>
                    </div>
                `;
            });
            rankList.innerHTML = html;

            $$('.rank-item').forEach(item => {
                item.addEventListener('click', () => {
                    const id = parseInt(item.dataset.id, 10);
                    if (id) openDetail(id);
                });
            });
        }

        rankTabs.addEventListener('click', (e) => {
            const btn = e.target.closest('button');
            if (!btn) return;
            $$('.rank-tabs button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentRank = btn.dataset.rank;
            renderRank();
        });

        // ================================================================
        // LIKE
        // ================================================================
        function toggleLike(postId) {
            const user = requireAuth();
            if (!user) return;
            const post = data.posts.find(p => p.id === postId);
            if (!post) return;

            const idx = post.likes.indexOf(user.id);
            if (idx > -1) {
                post.likes.splice(idx, 1);
                showToast('已取消点赞', 'info');
            } else {
                post.likes.push(user.id);
                showToast('点赞成功 ❤️', 'success');
            }
            saveData();
            renderFeed();
            renderRank();
            renderChampions();
            if (detailModal.classList.contains('open') && viewingPostId === postId) {
                openDetail(postId);
            }
        }

        // ================================================================
        // DETAIL
        // ================================================================
        function openDetail(postId) {
            const post = data.posts.find(p => p.id === postId);
            if (!post) { showToast('帖子不存在', 'error'); return; }

            viewingPostId = postId;
            post.views = (post.views || 0) + 1;
            saveData();

            const user = getCurrentUser();
            const liked = user ? post.likes.includes(user.id) : false;
            const commentCount = post.comments ? post.comments.length : 0;
            const price = post.price || 0;

            const authorUser = data.users.find(u => u.id === post.authorId);
            const authorAvatar = authorUser && authorUser.avatar ? authorUser.avatar : '';

            let mediaHtml = '';
            if (post.images && post.images.length > 0) {
                mediaHtml += `<div class="detail-media">`;
                post.images.forEach(img => {
                    mediaHtml += `<img src="${img}" alt="图片" />`;
                });
                mediaHtml += `</div>`;
            }
            if (post.video) {
                mediaHtml += `<div class="detail-media"><video src="${post.video}" controls></video></div>`;
            }

            let commentsHtml = '';
            if (post.comments && post.comments.length > 0) {
                post.comments.forEach(c => {
                    const cUser = data.users.find(u => u.id === c.authorId);
                    const cAvatar = cUser && cUser.avatar ? cUser.avatar : '';
                    const cName = c.authorName || '匿名';
                    commentsHtml += `
                        <div class="comment-item">
                            <div class="c-avatar">${cAvatar ? `<img src="${cAvatar}" />` : cName.charAt(0).toUpperCase()}</div>
                            <div class="c-body">
                                <span class="c-name">${cName}</span>
                                <span class="c-time">${formatTime(c.time)}</span>
                                <div class="c-text">${escapeHtml(c.content)}</div>
                            </div>
                        </div>
                    `;
                });
            } else {
                commentsHtml = `<div class="comment-empty">暂无评论，来说点什么吧</div>`;
            }

            detailContent.innerHTML = `
                <div class="detail-header">
                    <div class="avatar">${authorAvatar ? `<img src="${authorAvatar}" />` : post.authorName.charAt(0).toUpperCase()}</div>
                    <div class="info">
                        <div class="name">${post.authorName}</div>
                        <div class="time">${formatTime(post.time)} · ${post.views || 0} 次浏览</div>
                    </div>
                </div>
                <div class="detail-title">${escapeHtml(post.title)}</div>
                <div class="detail-body">${escapeHtml(post.content)}</div>
                ${mediaHtml}
                <div class="detail-meta">
                    <button class="action-btn like-btn ${liked ? 'liked' : ''}" data-id="${post.id}">
                        <i class="${liked ? 'fas' : 'far'} fa-heart"></i>
                        <span class="count">${post.likes.length}</span>
                    </button>
                    <button class="action-btn comment-btn" data-id="${post.id}">
                        <i class="far fa-comment"></i>
                        <span class="count">${commentCount}</span>
                    </button>
                    <button class="action-btn share-btn" data-id="${post.id}">
                        <i class="fas fa-share-alt"></i>
                        <span class="count">${post.shares || 0}</span>
                    </button>
                    ${price > 0 ? `<span class="price-tag"><i class="fas fa-coins"></i> 付费 ¥${price.toFixed(2)}</span>` : ''}
                </div>
                <div class="comments-section">
                    <div class="comment-title"><i class="far fa-comment-dots"></i> 评论 (${commentCount})</div>
                    <div class="comment-input">
                        <input type="text" id="commentInput" placeholder="写下你的评论..." />
                        <button class="emoji-btn" id="emojiToggle" title="选择表情"><i class="far fa-smile"></i></button>
                        <button id="commentSubmit">发送</button>
                    </div>
                    <div class="emoji-picker" id="emojiPicker">
                        <button class="emoji-option" data-emoji="😊">😊</button>
                        <button class="emoji-option" data-emoji="😂">😂</button>
                        <button class="emoji-option" data-emoji="❤️">❤️</button>
                        <button class="emoji-option" data-emoji="👍">👍</button>
                        <button class="emoji-option" data-emoji="🔥">🔥</button>
                        <button class="emoji-option" data-emoji="🎉">🎉</button>
                        <button class="emoji-option" data-emoji="💡">💡</button>
                        <button class="emoji-option" data-emoji="🙌">🙌</button>
                        <button class="emoji-option" data-emoji="✨">✨</button>
                        <button class="emoji-option" data-emoji="💪">💪</button>
                        <button class="emoji-option" data-emoji="🤔">🤔</button>
                        <button class="emoji-option" data-emoji="👏">👏</button>
                    </div>
                    <div id="commentList">${commentsHtml}</div>
                </div>
            `;

            detailModal.classList.add('open');

            // ===== 点赞事件 =====
            const likeBtn = detailContent.querySelector('.like-btn');
            if (likeBtn) {
                likeBtn.addEventListener('click', () => {
                    const id = parseInt(likeBtn.dataset.id, 10);
                    if (id) toggleLike(id);
                });
            }

            // ===== 分享事件 =====
            const shareBtn = detailContent.querySelector('.share-btn');
            if (shareBtn) {
                shareBtn.addEventListener('click', () => {
                    const id = parseInt(shareBtn.dataset.id, 10);
                    if (id) openShare(id);
                });
            }

            // ===== 评论提交事件 =====
            const commentInput = detailContent.querySelector('#commentInput');
            const commentSubmit = detailContent.querySelector('#commentSubmit');
            if (commentSubmit && commentInput) {
                const submitComment = () => {
                    const text = commentInput.value.trim();
                    if (!text) { showToast('请输入评论内容', 'error'); return; }
                    const user = requireAuth();
                    if (!user) return;
                    const post = data.posts.find(p => p.id === postId);
                    if (!post) return;
                    if (!post.comments) post.comments = [];
                    post.comments.push({
                        id: 'c' + Date.now() + Math.random().toString(36).slice(2, 6),
                        authorId: user.id,
                        authorName: user.username,
                        content: text,
                        time: Date.now(),
                    });
                    saveData();
                    commentInput.value = '';
                    showToast('评论成功！', 'success');
                    openDetail(postId);
                    renderFeed();
                    renderRank();
                    renderChampions();
                };
                commentSubmit.addEventListener('click', submitComment);
                commentInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') submitComment();
                });
            }

            // ================================================================
            // ===== Emoji 选择器事件 =====
            // ================================================================
            const emojiToggle = detailContent.querySelector('#emojiToggle');
            const emojiPicker = detailContent.querySelector('#emojiPicker');

            if (emojiToggle && emojiPicker) {
                // 点击笑脸按钮切换面板
                emojiToggle.addEventListener('click', function(e) {
                    e.stopPropagation();
                    if (emojiPicker.style.display === 'grid') {
                        emojiPicker.style.display = 'none';
                    } else {
                        emojiPicker.style.display = 'grid';
                    }
                });

                // 点击 Emoji 插入到输入框
                emojiPicker.querySelectorAll('.emoji-option').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const emoji = this.dataset.emoji;
                        const input = detailContent.querySelector('#commentInput');
                        if (input) {
                            const start = input.selectionStart;
                            const end = input.selectionEnd;
                            const text = input.value;
                            input.value = text.substring(0, start) + emoji + text.substring(end);
                            input.focus();
                            input.selectionStart = input.selectionEnd = start + emoji.length;
                        }
                        emojiPicker.style.display = 'none';
                    });
                });

                // 点击页面其他地方关闭面板
                document.addEventListener('click', function() {
                    if (emojiPicker) {
                        emojiPicker.style.display = 'none';
                    }
                });
            }
        }

        detailClose.addEventListener('click', () => {
            detailModal.classList.remove('open');
            renderFeed();
            renderRank();
            renderChampions();
        });
        detailModal.addEventListener('click', (e) => {
            if (e.target === detailModal) {
                detailModal.classList.remove('open');
                renderFeed();
                renderRank();
                renderChampions();
            }
        });

        // ================================================================
        // SHARE
        // ================================================================
        function openShare(postId) {
            const post = data.posts.find(p => p.id === postId);
            if (!post) { showToast('帖子不存在', 'error'); return; }

            post.shares = (post.shares || 0) + 1;
            saveData();

            const url = window.location.href.split('?')[0] + '?post=' + postId;
            shareLinkInput.value = url;
            shareModal.classList.add('open');
            renderFeed();
            renderRank();
            renderChampions();
        }

        shareCopyBtn.addEventListener('click', () => {
            const val = shareLinkInput.value;
            if (navigator.clipboard) {
                navigator.clipboard.writeText(val).then(() => {
                    showToast('链接已复制！', 'success');
                }).catch(() => {
                    fallbackCopy(val);
                });
            } else {
                fallbackCopy(val);
            }
        });

        function fallbackCopy(text) {
            shareLinkInput.select();
            try {
                document.execCommand('copy');
                showToast('链接已复制！', 'success');
            } catch (_) {
                showToast('复制失败，请手动复制', 'error');
            }
        }

        shareClose.addEventListener('click', () => shareModal.classList.remove('open'));
        shareModal.addEventListener('click', (e) => {
            if (e.target === shareModal) shareModal.classList.remove('open');
        });

        // ================================================================
        // PUBLISH
        // ================================================================
        btnUploadImages.addEventListener('click', () => {
            pubImages.click();
        });

        pubImages.addEventListener('change', function(e) {
            const files = Array.from(this.files);
            const remaining = 8 - uploadImages.length;

            if (files.length > remaining) {
                showToast(`最多还能上传 ${remaining} 张图片`, 'error');
                this.value = '';
                return;
            }

            files.forEach(file => {
                if (file.size > 5 * 1024 * 1024) {
                    showToast('图片不能超过 5MB', 'error');
                    return;
                }
                const reader = new FileReader();
                reader.onload = function(e) {
                    uploadImages.push(e.target.result);
                    renderImagePreview();
                    updateImageCount();
                };
                reader.readAsDataURL(file);
            });
            this.value = '';
        });

        function renderImagePreview() {
            let html = '';
            uploadImages.forEach((img, idx) => {
                html += `
                    <div class="preview-item">
                        <img src="${img}" alt="图片" />
                        <button class="remove-btn" data-idx="${idx}"><i class="fas fa-times"></i></button>
                    </div>
                `;
            });
            imagePreview.innerHTML = html;

            imagePreview.querySelectorAll('.remove-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const idx = parseInt(this.dataset.idx, 10);
                    uploadImages.splice(idx, 1);
                    renderImagePreview();
                    updateImageCount();
                });
            });
        }

        function updateImageCount() {
            imageCount.textContent = `已选 ${uploadImages.length} 张`;
        }

        btnUploadVideo.addEventListener('click', () => {
            pubVideo.click();
        });

        pubVideo.addEventListener('change', function(e) {
            const file = this.files[0];
            if (!file) return;

            if (uploadVideo) {
                showToast('只能上传 1 个视频', 'error');
                this.value = '';
                return;
            }

            if (file.size > 50 * 1024 * 1024) {
                showToast('视频不能超过 50MB', 'error');
                this.value = '';
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                uploadVideo = e.target.result;
                renderVideoPreview();
                updateVideoCount();
            };
            reader.readAsDataURL(file);
            this.value = '';
        });

        function renderVideoPreview() {
            if (uploadVideo) {
                videoPreview.innerHTML = `
                    <div class="preview-item">
                        <video src="${uploadVideo}" controls></video>
                        <button class="remove-btn" id="removeVideo"><i class="fas fa-times"></i></button>
                    </div>
                `;
                const removeBtn = document.getElementById('removeVideo');
                if (removeBtn) {
                    removeBtn.addEventListener('click', () => {
                        uploadVideo = null;
                        renderVideoPreview();
                        updateVideoCount();
                    });
                }
            } else {
                videoPreview.innerHTML = '';
            }
        }

        function updateVideoCount() {
            videoCount.textContent = uploadVideo ? '已选择 1 个视频' : '未选择';
        }

        btnPublish.addEventListener('click', () => {
            const user = requireAuth();
            if (!user) return;

            const title = pubTitle.value.trim();
            const content = pubContent.value.trim();
            const price = parseFloat(pubPrice.value) || 0;

            if (!title) { showToast('请输入标题', 'error');
                pubTitle.focus(); return; }
            if (!content) { showToast('请输入内容', 'error');
                pubContent.focus(); return; }
            if (price < 0) { showToast('金额不能为负数', 'error'); return; }

            const newPost = {
                id: data.nextPostId++,
                title,
                content,
                authorId: user.id,
                authorName: user.username,
                time: Date.now(),
                likes: [],
                comments: [],
                views: 0,
                shares: 0,
                price: price,
                images: [...uploadImages],
                video: uploadVideo || '',
            };

            data.posts.unshift(newPost);
            saveData();

            pubTitle.value = '';
            pubContent.value = '';
            pubPrice.value = '0';
            uploadImages = [];
            uploadVideo = null;
            renderImagePreview();
            updateImageCount();
            renderVideoPreview();
            updateVideoCount();

            showToast('发布成功！🎉', 'success');
            navigateTo('home');
            renderFeed();
            renderRank();
            renderChampions();
        });

        // ================================================================
        // PROFILE
        // ================================================================
        function renderProfile() {
            const user = getCurrentUser();

            if (!user) {
                profileBox.innerHTML = `
                    <div class="profile-empty">
                        <i class="fas fa-user-circle" style="font-size:48px;color:var(--text-secondary);display:block;margin-bottom:12px;"></i>
                        请先登录查看个人中心
                        <br /><br />
                        <button class="btn-login" style="background:var(--primary);color:#fff;padding:10px 32px;border-radius:30px;font-weight:500;border:none;cursor:pointer;" onclick="openAuthModal()">
                            去登录
                        </button>
                    </div>
                `;
                return;
            }

            const avatarUrl = user.avatar || '';
            const avatarDisplay = avatarUrl ?
                `<img src="${avatarUrl}" alt="头像" />` :
                `<div class="big-avatar">${user.username.charAt(0).toUpperCase()}</div>`;

            const userPosts = data.posts.filter(p => p.authorId === user.id);
            let postsHtml = '';
            if (userPosts.length === 0) {
                postsHtml = `<div class="profile-empty">你还没有发布过帖子</div>`;
            } else {
                userPosts.forEach(p => {
                    postsHtml += `
                        <div class="pp-item" data-id="${p.id}">
                            <div class="pp-title-text">${escapeHtml(p.title)}</div>
                            <div class="pp-meta">${formatTime(p.time)} · ${p.likes.length} 赞 · ${p.comments ? p.comments.length : 0} 评论</div>
                        </div>
                    `;
                });
            }

            profileBox.innerHTML = `
                <div class="profile-head">
                    <div class="avatar-wrapper" id="avatarWrapper">
                        ${avatarDisplay}
                        <div class="avatar-overlay" id="avatarOverlay">
                            <i class="fas fa-camera"></i>
                            <span>更换头像</span>
                        </div>
                        <input type="file" id="avatarInput" accept="image/*" style="display:none;" />
                    </div>
                    <div class="p-info">
                        <div class="p-name">${user.username}</div>
                        <div class="p-joined">加入于 ${formatTime(user.joined)}</div>
                        <button class="btn-change-avatar" id="changeAvatarBtn">
                            <i class="fas fa-camera"></i> 更换头像
                        </button>
                    </div>
                </div>
                <div class="profile-posts">
                    <div class="pp-title">我的帖子 (${userPosts.length})</div>
                    ${postsHtml}
                </div>
            `;

            const avatarWrapper = document.getElementById('avatarWrapper');
            const avatarOverlay = document.getElementById('avatarOverlay');
            const changeAvatarBtn = document.getElementById('changeAvatarBtn');
            const avatarInput = document.getElementById('avatarInput');

            if (avatarOverlay) {
                avatarOverlay.style.display = 'none';
            }

            if (avatarWrapper && avatarInput) {
                avatarWrapper.addEventListener('click', function(e) {
                    if (e.target.closest('.btn-change-avatar')) return;
                    avatarInput.click();
                });
            }

            if (changeAvatarBtn && avatarInput) {
                changeAvatarBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    avatarInput.click();
                });
            }

            if (avatarInput) {
                avatarInput.addEventListener('change', function(e) {
                    const file = this.files[0];
                    if (!file) return;

                    if (file.size > 2 * 1024 * 1024) {
                        showToast('图片大小不能超过 2MB', 'error');
                        this.value = '';
                        return;
                    }

                    if (!['image/jpeg', 'image/png', 'image/gif', 'image/webp'].includes(file.type)) {
                        showToast('仅支持 JPG、PNG、GIF、WEBP 格式', 'error');
                        this.value = '';
                        return;
                    }

                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const currentUser = getCurrentUser();
                        if (currentUser) {
                            currentUser.avatar = e.target.result;
                            data.posts.forEach(p => {
                                if (p.authorId === currentUser.id) {
                                    p.authorAvatar = e.target.result;
                                }
                            });
                            saveData();
                            renderProfile();
                            renderNav();
                            renderFeed();
                            showToast('头像更新成功！ 🎉', 'success');
                        }
                    };
                    reader.onerror = function() {
                        showToast('读取图片失败，请重试', 'error');
                    };
                    reader.readAsDataURL(file);
                });
            }

            $$('.pp-item').forEach(item => {
                item.addEventListener('click', function() {
                    const id = parseInt(this.dataset.id, 10);
                    if (id) openDetail(id);
                });
            });
        }

        // ================================================================
        // UTILITY
        // ================================================================
        function formatTime(ts) {
            if (!ts) return '刚刚';
            const diff = Date.now() - ts;
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return Math.floor(diff / 60000) + ' 分钟前';
            if (diff < 86400000) return Math.floor(diff / 3600000) + ' 小时前';
            if (diff < 172800000) return '昨天';
            if (diff < 259200000) return '前天';
            const d = new Date(ts);
            const pad = n => String(n).padStart(2, '0');
            return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) + ' ' +
                pad(d.getHours()) + ':' + pad(d.getMinutes());
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function closeAllModals() {
            authModal.classList.remove('open');
            detailModal.classList.remove('open');
            shareModal.classList.remove('open');
        }

        // ================================================================
        // INIT
        // ================================================================
        function init() {
            const user = getCurrentUser();
            if (user) currentUser = user;
            renderNav();
            renderFeed();
            renderRank();
            renderProfile();
            renderChampions();

            const params = new URLSearchParams(window.location.search);
            const postId = params.get('post');
            if (postId) {
                const id = parseInt(postId, 10);
                if (!isNaN(id)) {
                    setTimeout(() => openDetail(id), 500);
                }
            }

            console.log('🌟 趣社区已启动！');
            console.log('💡 登录后进入「我的」页面，鼠标悬停到头像上即可更换头像');
            console.log('📸 发布帖子支持上传最多 8 张图片和 1 个视频');
            console.log('🏆 首页顶部展示三个排行榜的第一名');
            console.log('😊 评论时点击笑脸图标可以选择 Emoji');
        }

        window.openAuthModal = openAuthModal;
        window.openDetail = openDetail;
        window.openShare = openShare;

        init();

        window.addEventListener('storage', (e) => {
            if (e.key === STORAGE_KEY) {
                data = loadData();
                renderFeed();
                renderRank();
                renderProfile();
                renderChampions();
            }
        });
    </script>
</body>
</html>
